<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBay Web Clipper</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #faf8f5;
      color: #3d2b1f;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      background: #c19a6b;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 22px;
      height: 22px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon::before {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      border: 2px solid #fff;
      border-radius: 2px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    /* Content area */
    .content {
      padding: 16px;
    }

    /* Login view */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 0 8px;
    }

    .login-desc {
      font-size: 13px;
      color: #7a5c44;
      text-align: center;
      line-height: 1.6;
    }

    /* Main view */
    #main-view {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #9c7a5e;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .url-field {
      background: #f0ece6;
      border: 1px solid #e2d9ce;
      border-radius: 6px;
      padding: 8px 10px;
    }

    #current-url {
      font-size: 12px;
      color: #5a3e2b;
      word-break: break-all;
      line-height: 1.5;
      max-height: 52px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .select-wrapper {
      position: relative;
    }

    #kb-select {
      width: 100%;
      appearance: none;
      background: #fff;
      border: 1px solid #e2d9ce;
      border-radius: 6px;
      padding: 8px 32px 8px 10px;
      font-size: 13px;
      color: #3d2b1f;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    #kb-select:focus {
      border-color: #c19a6b;
      box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.15);
    }

    #kb-select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .select-arrow {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #9c7a5e;
      font-size: 10px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      outline: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #c19a6b;
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      background: #b08050;
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: transparent;
      color: #9c7a5e;
      border: 1px solid #ddd0c3;
    }

    .btn-outline:hover {
      background: #f0ece6;
    }

    /* Status */
    #status {
      display: none;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      line-height: 1.5;
    }

    #status.status {
      display: block;
    }

    .status.success {
      background: #edf7ed;
      color: #2e7d32;
      border: 1px solid #c3e6c3;
    }

    .status.error {
      background: #fdecea;
      color: #b71c1c;
      border: 1px solid #f5c6c0;
    }

    .status.loading {
      background: #fef8ee;
      color: #8a5f1a;
      border: 1px solid #f5dfa8;
    }

    /* Footer */
    #footer {
      padding: 10px 16px 14px;
      border-top: 1px solid #ede5da;
      display: flex;
      justify-content: flex-end;
    }

    /* Hidden utility */
    .hidden {
      display: none !important;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #ede5da;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon"></div>
    <h1>DBay Web Clipper</h1>
  </div>

  <div class="content">
    <!-- Login view -->
    <div id="login-view" class="hidden">
      <p class="login-desc">登录 DBay 账号，将网页一键保存到你的知识库。</p>
      <button id="login-btn" class="btn btn-primary" style="width: 100%;">登录 DBay</button>
    </div>

    <!-- Main view -->
    <div id="main-view" class="hidden">
      <div class="url-field">
        <div class="field-label">当前页面</div>
        <div id="current-url"></div>
      </div>

      <div>
        <div class="field-label">保存到知识库</div>
        <div class="select-wrapper">
          <select id="kb-select" disabled>
            <option value="">加载中...</option>
          </select>
          <span class="select-arrow">&#9660;</span>
        </div>
      </div>

      <button id="save-btn" class="btn btn-primary" disabled>保存到知识库</button>

      <div id="status"></div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer" class="hidden">
    <button id="logout-btn" class="btn btn-outline">退出登录</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
