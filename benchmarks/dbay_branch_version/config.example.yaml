profile: public-comparison
resource_prefix: bench-branch-version
api_base_url: https://api.dbay.cloud:8443/api/v1
compute_size: 1cu
poll_interval_seconds: 2.0
poll_timeout_seconds: 600.0
request_timeout_seconds: 180.0
result_root: results
datasets:
  - S
  - M
allow_large_dataset: false
limits:
  max_branch_concurrency: 10
  max_total_branches: 100
  max_total_versions: 100
  max_runtime_seconds: 14400
scenarios:
  branch_create_without_compute:
    samples_per_dataset: 10
  branch_create_with_compute:
    samples_per_dataset: 3
  branch_create_concurrent:
    total_samples: 10
    concurrency:
      - 5
  branch_depth:
    depths:
      - 1
  version_create:
    samples_per_dataset: 10
  version_read:
    samples: 100
    concurrency: 5
  version_squash:
    groups: 3
    versions_per_group: 10
