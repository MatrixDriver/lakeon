global:
  namespace: lakeon
  imagePullSecrets: []

initImage: "busybox:1.36"

neon:
  image:
    repository: ghcr.io/neondatabase/neon
    tag: latest
    pullPolicy: IfNotPresent
  computeImage:
    repository: ghcr.io/neondatabase/compute-node-v17
    tag: latest

pageserver:
  replicas: 1
  httpPort: 9898
  pgPort: 6400
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

safekeeper:
  replicas: 3
  pgPort: 5454
  httpPort: 7676
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

storageBroker:
  replicas: 1
  port: 50051

proxy:
  replicas: 2
  listenPort: 4432
  httpPort: 7100
  mgmtPort: 7000
  authBackend: control-plane
  # External host for user-facing connection URIs (e.g. ELB IP or domain)
  # If empty, falls back to cluster-internal proxy DNS
  externalHost: ""
  tls:
    enabled: false
    secretName: proxy-tls-cert
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"

api:
  replicas: 2
  port: 8080
  serviceType: ClusterIP
  adminToken: ""
  ssl:
    enabled: false
  image:
    repository: lakeon/lakeon-api
    tag: "0.1.0"
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
  # nodeSelector for compute pods (elastic node pool scheduling)
  # Example: { "lakeon/role": "compute" }
  computeNodeSelector: {}

obs:
  endpoint: ""
  bucket: "lakeon-neon"
  region: "cn-north-4"
  accessKey: ""
  secretKey: ""
  # Set to true for S3-compatible stores that support path-style (e.g., MinIO).
  # Set to false for stores requiring virtual-host-style (e.g., Huawei OBS, AWS S3).
  usePathStyle: false

metadataDb:
  # Set enabled=true to deploy a PostgreSQL instance for metadata within the cluster
  enabled: false
  host: ""
  port: 5432
  name: "lakeon"
  user: "lakeon"
  password: ""
  image:
    repository: postgres
    tag: "15-alpine"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

networkPolicy:
  enabled: false

minio:
  # Set enabled=true to deploy MinIO as S3-compatible storage within the cluster
  enabled: false
  image:
    repository: minio/minio
    tag: latest
  mcImage:
    repository: minio/mc
    tag: latest
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  bucket: "lakeon-neon"
  port: 9000
  consolePort: 9001
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

admin:
  enabled: false
  image:
    repository: lakeon/lakeon-admin
    tag: "0.1.0"
  replicas: 1
  port: 80
  serviceType: ClusterIP
  nodePort: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

datalake:
  cciNamespacePrefix: "datalake-"
  vkNodeSelectorKey: "type"
  vkNodeSelectorValue: "virtual-kubelet"
  pollIntervalMs: "10000"
  images:
    pythonSlim: "swr.cn-north-4.myhuaweicloud.com/lakeon/python:3.11-slim"
    pythonData: "swr.cn-north-4.myhuaweicloud.com/lakeon/python:3.11-data"
    ray: "swr.cn-north-4.myhuaweicloud.com/lakeon/ray:2.10-py311"
    rayGpu: "swr.cn-north-4.myhuaweicloud.com/lakeon/ray:2.10-py311-gpu"

# Node init DaemonSet — fixes containerd core ulimit for Neon compute_ctl
# See: doc/neon-modifications.md (问题 1)
nodeInit:
  enabled: false
  image: "busybox:1.36"

console:
  enabled: false
  image:
    repository: lakeon/lakeon-console
    tag: "0.1.0"
  replicas: 1
  port: 80
  serviceType: ClusterIP
  nodePort: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
