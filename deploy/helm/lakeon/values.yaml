global:
  namespace: lakeon
  imagePullSecrets: []

plane:
  # all keeps the historical single-cluster deployment.
  # control renders lakeon-api and control-plane support resources.
  # data renders Neon data-plane services.
  mode: all

dataPlane:
  kubeApiServer: ""
  kubeToken: ""
  kubeCaB64: ""
  namespace: lakeon
  computeNamespace: lakeon-compute
  pageserverReplicas: 3
  pageserverNodesRawOverride: ""
  pageserverDiscovery:
    enabled: false
    namespace: ""
    labelSelector: "app=pageserver"
    headlessService: "pageserver-headless"
    httpPort: 9898
    pgPort: 6400
  pageserverUrl: "http://pageserver.lakeon.svc.cluster.local:9898"
  safekeeperUrls: "safekeeper-0.safekeeper.lakeon.svc.cluster.local:5454,safekeeper-1.safekeeper.lakeon.svc.cluster.local:5454,safekeeper-2.safekeeper.lakeon.svc.cluster.local:5454"
  storageBrokerUrl: "http://storage-broker.lakeon.svc.cluster.local:50051"

initImage: "busybox:1.36"

neon:
  image:
    repository: ghcr.io/neondatabase/neon
    tag: latest
    pullPolicy: IfNotPresent
  computeImage:
    repository: ghcr.io/neondatabase/compute-node-v17
    tag: latest

pageserver:
  replicas: 3
  serviceType: ClusterIP
  httpPort: 9898
  pgPort: 6400
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

dicer:
  enabled: false
  replicas: 1
  image:
    repository: dicer-assigner
    tag: latest
    pullPolicy: IfNotPresent
  service:
    name: dicer-assigner
    port: 24500
    infoPort: 7777
  location:
    kubernetesClusterUri: "kubernetes-cluster:prod/huawei/public/cn-north-4/control/01"
  config:
    targetConfigDirectory: /app/config/target_config
    advancedTargetConfigDirectory: /app/config/advanced_config
  nodeLoadsRaw: ""
  unavailableNodesRaw: ""
  liveLoadEnabled: false
  liveLoadPollIntervalMs: 10000
  liveLoadInitialDelayMs: 5000
  metricsTimeoutMs: 1000
  snapshotTtlMs: 30000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

safekeeper:
  replicas: 3
  pgPort: 5454
  httpPort: 7676
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

storageBroker:
  replicas: 1
  port: 50051

proxy:
  replicas: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  lakeonDataProxy:
    enabled: false
    maxBackendsPerKey: 20
  listenPort: 4432
  httpPort: 7100
  mgmtPort: 7000
  authBackend: control-plane
  authEndpoint: ""
  # Cache for proxy project_info / role secrets. Disable with size=0 when
  # password resets must take effect immediately across proxy replicas.
  projectInfoCache: ""
  # Cache for wake_compute node info. Disable with size=0 when compute pods can
  # be rolled during password reset and stale pod addresses must be avoided.
  wakeComputeCache: ""
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
  # External host for user-facing connection URIs (e.g. ELB IP or domain)
  # If empty, falls back to cluster-internal proxy DNS
  externalHost: ""
  tls:
    enabled: false
    secretName: proxy-tls-cert
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"

api:
  replicas: 2
  port: 8080
  serviceType: ClusterIP
  adminToken: ""
  connectorSecretKey: ""
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  ssl:
    enabled: false
  image:
    repository: lakeon/lakeon-api
    tag: "0.1.0"
  gateway:
    replicas: 2
    image: "nginx:1.27"
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
  # nodeSelector for compute pods (elastic node pool scheduling)
  # Example: { "lakeon/role": "compute" }
  computeNodeSelector: {}
  publicElb:
    enabled: false
    id: ""
    class: "performance"
    port: 8443
    internalPort: 8088
  ingress:
    enabled: false
    name: lakeon-api-gateway
    className: ""
    annotations: {}
    host: ""
    port: 8443
    backendPort: ""
    tls: []
  split:
    enabled: false
    components:
      serving:
        name: serving-api
        replicas: 1
        autoscaling:
          enabled: false
          minReplicas: 1
          maxReplicas: 3
          targetCPUUtilizationPercentage: 70
      admin:
        name: admin-api
        replicas: 1
        autoscaling:
          enabled: false
          minReplicas: 1
          maxReplicas: 2
          targetCPUUtilizationPercentage: 70

obs:
  endpoint: ""
  bucket: "lakeon-neon"
  region: "cn-north-4"
  accessKey: ""
  secretKey: ""
  # Set to true for S3-compatible stores that support path-style (e.g., MinIO).
  # Set to false for stores requiring virtual-host-style (e.g., Huawei OBS, AWS S3).
  usePathStyle: false

metadataDb:
  # Set enabled=true to deploy a PostgreSQL instance for metadata within the cluster
  enabled: false
  host: ""
  port: 5432
  name: "lakeon"
  user: "lakeon"
  password: ""
  image:
    repository: postgres
    tag: "15-alpine"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

networkPolicy:
  enabled: false

minio:
  # Set enabled=true to deploy MinIO as S3-compatible storage within the cluster
  enabled: false
  image:
    repository: minio/minio
    tag: latest
  mcImage:
    repository: minio/mc
    tag: latest
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  bucket: "lakeon-neon"
  port: 9000
  consolePort: 9001
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

admin:
  enabled: false
  image:
    repository: lakeon/lakeon-admin
    tag: "0.1.0"
  replicas: 1
  port: 80
  serviceType: ClusterIP
  nodePort: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Node init DaemonSet — fixes containerd core ulimit for Neon compute_ctl
# See: doc/neon-modifications.md (问题 1)
nodeInit:
  enabled: false
  image: "busybox:1.36"

console:
  enabled: false
  image:
    repository: lakeon/lakeon-console
    tag: "0.1.0"
  replicas: 1
  port: 80
  serviceType: ClusterIP
  nodePort: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

fluentbit:
  enabled: true
  image: "cr.fluentbit.io/fluent/fluent-bit:3.2"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

logCollector:
  enabled: true
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/flex/log-collector
    tag: "0.1.4"

computeJwt:
  privateKey: ""
  publicJwk: ""
  kid: "lakeon-compute-1"

computeWarmPool:
  enabled: false
  size: 2
  mockTenantId: ""
  mockTimelineId: ""
  image: ""
