{{- if include "lakeon.dataPlaneEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: pageserver-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
data:
  pageserver.toml: |
    listen_pg_addr = '0.0.0.0:{{ .Values.pageserver.pgPort }}'
    listen_http_addr = '0.0.0.0:{{ .Values.pageserver.httpPort }}'
    broker_endpoint = 'http://storage-broker:{{ .Values.storageBroker.port }}'
    control_plane_api = 'http://storage-controller:1234/upcall/v1'
    pg_distrib_dir = '/usr/local'

    [remote_storage]
    {{- if .Values.obs.usePathStyle }}
    endpoint = '{{ .Values.obs.endpoint }}'
    {{- end }}
    bucket_name = '{{ .Values.obs.bucket }}'
    bucket_region = '{{ .Values.obs.region }}'
    prefix_in_bucket = '/pageserver'
  identity.toml: |
    id = 1
{{- end }}
