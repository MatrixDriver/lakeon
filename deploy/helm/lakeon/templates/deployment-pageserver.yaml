apiVersion: apps/v1
kind: Deployment
metadata:
  name: pageserver
  namespace: {{ .Values.global.namespace }}
  labels:
    app: pageserver
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pageserver.replicas }}
  selector:
    matchLabels:
      app: pageserver
  template:
    metadata:
      labels:
        app: pageserver
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-ro/pageserver.toml /data/pageserver.toml
              cp /config-ro/identity.toml /data/identity.toml
          volumeMounts:
            - name: config
              mountPath: /config-ro
            - name: data
              mountPath: /data
      containers:
        - name: pageserver
          image: "{{ .Values.neon.image.repository }}:{{ .Values.neon.image.tag }}"
          imagePullPolicy: {{ .Values.neon.image.pullPolicy }}
          command: ["pageserver"]
          args:
            - "-D"
            - "/data"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: secret-key
            {{- if and .Values.obs.endpoint (not .Values.obs.usePathStyle) }}
            - name: AWS_ENDPOINT_URL
              value: {{ .Values.obs.endpoint | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.pageserver.httpPort }}
              name: http
            - containerPort: {{ .Values.pageserver.pgPort }}
              name: pg
          resources:
            {{- toYaml .Values.pageserver.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: pageserver-config
        - name: data
          emptyDir: {}
