{{- if .Values.orchestrator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline-orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pipeline-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipeline-orchestrator
    spec:
      serviceAccountName: pipeline-orchestrator
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: LAKEON_ORCH_DB_HOST
              value: {{ .Values.metadataDb.host | quote }}
            - name: LAKEON_ORCH_DB_PORT
              value: {{ .Values.metadataDb.port | default 5432 | quote }}
            - name: LAKEON_ORCH_DB_NAME
              value: {{ .Values.metadataDb.name | default "lakeon" | quote }}
            - name: LAKEON_ORCH_DB_USER
              value: {{ .Values.metadataDb.user | default "lakeon" | quote }}
            - name: LAKEON_ORCH_DB_PASSWORD
              value: {{ .Values.metadataDb.password | quote }}
            - name: LAKEON_ORCH_OBS_ENDPOINT
              value: {{ .Values.obs.endpoint | default "https://obs.cn-north-4.myhuaweicloud.com" | quote }}
            - name: LAKEON_ORCH_OBS_ACCESS_KEY
              value: {{ .Values.obs.accessKey | quote }}
            - name: LAKEON_ORCH_OBS_SECRET_KEY
              value: {{ .Values.obs.secretKey | quote }}
            - name: LAKEON_ORCH_OBS_BUCKET
              value: {{ .Values.obs.bucket | default "lakeon-data" | quote }}
            - name: LAKEON_ORCH_RAY_IMAGE
              value: {{ .Values.orchestrator.rayImage | default "swr.cn-north-4.myhuaweicloud.com/flex/ray:2.44-py311-data" | quote }}
            - name: LAKEON_ORCH_K8S_NAMESPACE
              value: {{ .Values.orchestrator.k8sNamespace | default "lakeon-pipeline" | quote }}
            - name: LAKEON_ORCH_IMAGE_PULL_SECRETS
              value: {{ .Values.orchestrator.imagePullSecrets | default "swr-secret" | quote }}
            - name: LAKEON_ORCH_VK_NODE_SELECTOR_KEY
              value: {{ .Values.orchestrator.vkNodeSelectorKey | default "type" | quote }}
            - name: LAKEON_ORCH_VK_NODE_SELECTOR_VALUE
              value: {{ .Values.orchestrator.vkNodeSelectorValue | default "virtual-kubelet" | quote }}
          resources:
            requests:
              cpu: {{ .Values.orchestrator.resources.requests.cpu | default "100m" | quote }}
              memory: {{ .Values.orchestrator.resources.requests.memory | default "256Mi" | quote }}
            limits:
              cpu: {{ .Values.orchestrator.resources.limits.cpu | default "1000m" | quote }}
              memory: {{ .Values.orchestrator.resources.limits.memory | default "512Mi" | quote }}
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline-orchestrator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pipeline-orchestrator
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
{{- end }}
