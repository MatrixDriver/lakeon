{{- if include "lakeon.controlPlaneEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakeon-api-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
data:
  LAKEON_DB_DSN: "jdbc:postgresql://{{ .Values.metadataDb.host }}:{{ .Values.metadataDb.port }}/{{ .Values.metadataDb.name }}"
  LAKEON_DB_USER: {{ .Values.metadataDb.user | quote }}
  LAKEON_NEON_PAGESERVER_URL: {{ .Values.dataPlane.pageserverUrl | default (printf "http://pageserver:%v" .Values.pageserver.httpPort) | quote }}
  LAKEON_NEON_PAGESERVER_NODES_RAW: {{ include "lakeon.pageserverNodesRaw" . | quote }}
  LAKEON_DICER_ENABLED: {{ ternary "true" "false" .Values.dicer.enabled | quote }}
  {{- if .Values.dicer.enabled }}
  LAKEON_DICER_ENDPOINT: {{ printf "http://%s.%s.svc.cluster.local:%v" .Values.dicer.service.name .Values.global.namespace .Values.dicer.service.port | quote }}
  {{- if .Values.dicer.nodeLoadsRaw }}
  LAKEON_DICER_NODE_LOADS_RAW: {{ .Values.dicer.nodeLoadsRaw | quote }}
  {{- end }}
  {{- if .Values.dicer.unavailableNodesRaw }}
  LAKEON_DICER_UNAVAILABLE_NODES_RAW: {{ .Values.dicer.unavailableNodesRaw | quote }}
  {{- end }}
  LAKEON_DICER_LIVE_LOAD_ENABLED: {{ ternary "true" "false" .Values.dicer.liveLoadEnabled | quote }}
  LAKEON_DICER_LIVE_LOAD_POLL_INTERVAL_MS: {{ .Values.dicer.liveLoadPollIntervalMs | default 10000 | quote }}
  LAKEON_DICER_LIVE_LOAD_INITIAL_DELAY_MS: {{ .Values.dicer.liveLoadInitialDelayMs | default 5000 | quote }}
  LAKEON_DICER_METRICS_TIMEOUT_MS: {{ .Values.dicer.metricsTimeoutMs | default 1000 | quote }}
  LAKEON_DICER_SNAPSHOT_TTL_MS: {{ .Values.dicer.snapshotTtlMs | default 30000 | quote }}
  {{- end }}
  LAKEON_NEON_SAFEKEEPER_URLS: {{ .Values.dataPlane.safekeeperUrls | default (include "lakeon.safekeeperConnstrings" .) | quote }}
  LAKEON_NEON_STORAGE_BROKER_URL: {{ .Values.dataPlane.storageBrokerUrl | default (printf "http://storage-broker:%v" .Values.storageBroker.port) | quote }}
  LAKEON_COMPUTE_IMAGE: "{{ .Values.neon.computeImage.repository }}:{{ .Values.neon.computeImage.tag }}"
  {{- if .Values.api.importImage }}
  LAKEON_IMPORT_IMAGE: {{ .Values.api.importImage | quote }}
  {{- end }}
  LAKEON_K8S_NAMESPACE: {{ .Values.dataPlane.computeNamespace | default "lakeon-compute" | quote }}
  {{- if .Values.dataPlane.kubeApiServer }}
  LAKEON_DATA_PLANE_KUBE_API_SERVER: {{ .Values.dataPlane.kubeApiServer | quote }}
  {{- end }}
  {{- if .Values.dataPlane.kubeCaB64 }}
  LAKEON_DATA_PLANE_KUBE_CA_B64: {{ .Values.dataPlane.kubeCaB64 | quote }}
  {{- end }}
  LAKEON_DATA_PLANE_NAMESPACE: {{ .Values.dataPlane.namespace | default .Values.global.namespace | quote }}
  LAKEON_DATA_PLANE_COMPUTE_NAMESPACE: {{ .Values.dataPlane.computeNamespace | default "lakeon-compute" | quote }}
  {{- if .Values.api.computeCpu }}
  LAKEON_COMPUTE_CPU: {{ .Values.api.computeCpu | quote }}
  {{- end }}
  {{- if .Values.api.computeMemory }}
  LAKEON_COMPUTE_MEMORY: {{ .Values.api.computeMemory | quote }}
  {{- end }}
  LAKEON_API_PORT: {{ .Values.api.port | quote }}
  {{- if .Values.api.ssl.enabled }}
  LAKEON_SSL_ENABLED: "true"
  {{- end }}
  {{- if .Values.obs.endpoint }}
  LAKEON_OBS_ENDPOINT: {{ .Values.obs.endpoint | quote }}
  {{- end }}
  LAKEON_OBS_BUCKET: {{ .Values.obs.bucket | default "lakeon-storage" | quote }}
  LAKEON_OBS_REGION: {{ .Values.obs.region | default "cn-north-4" | quote }}
  {{- if .Values.proxy.externalHost }}
  LAKEON_PROXY_EXTERNAL_HOST: {{ .Values.proxy.externalHost | quote }}
  {{- end }}
  LAKEON_PROXY_EXTERNAL_PORT: {{ .Values.proxy.listenPort | quote }}
  {{- if .Values.proxy.internalHost }}
  LAKEON_PROXY_INTERNAL_HOST: {{ .Values.proxy.internalHost | quote }}
  {{- end }}
  {{- if .Values.proxy.internalPort }}
  LAKEON_PROXY_INTERNAL_PORT: {{ .Values.proxy.internalPort | quote }}
  {{- end }}
  {{- if .Values.global.imagePullSecrets }}
  LAKEON_IMAGE_PULL_SECRETS: {{ range $i, $s := .Values.global.imagePullSecrets }}{{ if $i }},{{ end }}{{ $s.name }}{{ end }}
  {{- end }}
  {{- with .Values.cost }}
  LAKEON_COST_CCE_CLUSTER_HOURLY: {{ .cceClusterHourly | default "1.0" | quote }}
  LAKEON_COST_CCE_NODE_HOURLY: {{ .cceNodeHourly | default "1.5" | quote }}
  LAKEON_COST_CCE_NODE_COUNT: {{ .cceNodeCount | default "3" | quote }}
  LAKEON_COST_ELB_MONTHLY: {{ .elbMonthly | default "30" | quote }}
  LAKEON_COST_OBS_PER_GB_MONTHLY: {{ .obsPerGbMonthly | default "0.099" | quote }}
  LAKEON_COST_RDS_MONTHLY: {{ .rdsMonthly | default "500" | quote }}
  LAKEON_COST_EIP_MONTHLY: {{ .eipMonthly | default "150" | quote }}
  LAKEON_COST_COMPUTE_CU_HOURLY: {{ .computeCuHourly | default "0.5" | quote }}
  {{- end }}
  {{- if .Values.cloud }}
  {{- if .Values.cloud.resourceIds }}
  LAKEON_CLOUD_RESOURCE_IDS: {{ .Values.cloud.resourceIds | join "," | quote }}
  {{- end }}
  {{- if .Values.cloud.consoleRegion }}
  LAKEON_CLOUD_CONSOLE_REGION: {{ .Values.cloud.consoleRegion | quote }}
  {{- end }}
  {{- if .Values.cloud.cceClusterId }}
  LAKEON_CLOUD_CCE_CLUSTER_ID: {{ .Values.cloud.cceClusterId | quote }}
  {{- end }}
  {{- if .Values.cloud.controlCceClusterId }}
  LAKEON_CLOUD_CONTROL_CCE_CLUSTER_ID: {{ .Values.cloud.controlCceClusterId | quote }}
  {{- end }}
  {{- if .Values.cloud.controlCceClusterName }}
  LAKEON_CLOUD_CONTROL_CCE_CLUSTER_NAME: {{ .Values.cloud.controlCceClusterName | quote }}
  {{- end }}
  {{- if .Values.cloud.dataCceClusterId }}
  LAKEON_CLOUD_DATA_CCE_CLUSTER_ID: {{ .Values.cloud.dataCceClusterId | quote }}
  {{- end }}
  {{- if .Values.cloud.dataCceClusterName }}
  LAKEON_CLOUD_DATA_CCE_CLUSTER_NAME: {{ .Values.cloud.dataCceClusterName | quote }}
  {{- end }}
  {{- if .Values.cloud.rdsInstanceId }}
  LAKEON_CLOUD_RDS_INSTANCE_ID: {{ .Values.cloud.rdsInstanceId | quote }}
  {{- end }}
  {{- if .Values.cloud.elbId }}
  LAKEON_CLOUD_ELB_ID: {{ .Values.cloud.elbId | quote }}
  {{- end }}
  {{- if .Values.cloud.eipId }}
  LAKEON_CLOUD_EIP_ID: {{ .Values.cloud.eipId | quote }}
  {{- end }}
  {{- if .Values.cloud.nodePoolId }}
  LAKEON_CLOUD_NODE_POOL_ID: {{ .Values.cloud.nodePoolId | quote }}
  {{- end }}
  {{- if .Values.cloud.publicApiElbId }}
  LAKEON_CLOUD_PUBLIC_API_ELB_ID: {{ .Values.cloud.publicApiElbId | quote }}
  {{- end }}
  {{- if .Values.cloud.controlPrivateElbIp }}
  LAKEON_CLOUD_CONTROL_PRIVATE_ELB_IP: {{ .Values.cloud.controlPrivateElbIp | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.sync }}
  {{- if .Values.sync.pollIntervalMs }}
  LAKEON_SYNC_POLL_INTERVAL_MS: {{ .Values.sync.pollIntervalMs | quote }}
  {{- end }}
  {{- if .Values.sync.walWarnBytes }}
  LAKEON_SYNC_WAL_WARN_BYTES: {{ .Values.sync.walWarnBytes | quote }}
  {{- end }}
  {{- if .Values.sync.maxTasks }}
  LAKEON_SYNC_MAX_TASKS: {{ .Values.sync.maxTasks | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.api.computeNodeSelector }}
  LAKEON_COMPUTE_NODE_SELECTOR: {{ range $key, $value := .Values.api.computeNodeSelector }}{{ $key }}={{ $value }},{{ end }}
  {{- end }}
  {{- if .Values.api.ai }}
  {{- if .Values.api.ai.baseUrl }}
  LAKEON_AI_BASE_URL: {{ .Values.api.ai.baseUrl | quote }}
  {{- end }}
  {{- if .Values.api.ai.model }}
  LAKEON_AI_MODEL: {{ .Values.api.ai.model | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.api.inviteRequired }}
  LAKEON_INVITE_REQUIRED: "true"
  {{- end }}
  {{- if .Values.api.suspendPodRetainMinutes }}
  LAKEON_SUSPEND_POD_RETAIN_MINUTES: {{ .Values.api.suspendPodRetainMinutes | quote }}
  {{- end }}
  {{- with .Values.alert }}
  {{- if .smnTopicUrn }}
  LAKEON_ALERT_SMN_TOPIC_URN: {{ .smnTopicUrn | quote }}
  {{- end }}
  {{- if .smnRegion }}
  LAKEON_ALERT_SMN_REGION: {{ .smnRegion | default "cn-north-4" | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.api.logDbDsn }}
  LOG_DB_DSN: {{ .Values.api.logDbDsn | quote }}
  {{- end }}
  {{- if .Values.hwcloud }}
  {{- if .Values.hwcloud.accountId }}
  LAKEON_HWCLOUD_ACCOUNT_ID: {{ .Values.hwcloud.accountId | quote }}
  {{- end }}
  {{- if .Values.hwcloud.accountName }}
  LAKEON_HWCLOUD_ACCOUNT_NAME: {{ .Values.hwcloud.accountName | quote }}
  {{- end }}
  {{- end }}
{{- end }}
