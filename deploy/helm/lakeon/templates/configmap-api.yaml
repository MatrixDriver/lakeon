apiVersion: v1
kind: ConfigMap
metadata:
  name: lakeon-api-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
data:
  LAKEON_DB_DSN: "jdbc:postgresql://{{ .Values.metadataDb.host }}:{{ .Values.metadataDb.port }}/{{ .Values.metadataDb.name }}"
  LAKEON_DB_USER: {{ .Values.metadataDb.user | quote }}
  LAKEON_NEON_PAGESERVER_URL: "http://pageserver:{{ .Values.pageserver.httpPort }}"
  LAKEON_NEON_SAFEKEEPER_URLS: {{ include "lakeon.safekeeperConnstrings" . | quote }}
  LAKEON_NEON_STORAGE_BROKER_URL: "http://storage-broker:{{ .Values.storageBroker.port }}"
  LAKEON_COMPUTE_IMAGE: "{{ .Values.neon.computeImage.repository }}:{{ .Values.neon.computeImage.tag }}"
  {{- if .Values.api.importImage }}
  LAKEON_IMPORT_IMAGE: {{ .Values.api.importImage | quote }}
  {{- end }}
  LAKEON_K8S_NAMESPACE: "lakeon-compute"
  {{- if .Values.api.computeCpu }}
  LAKEON_COMPUTE_CPU: {{ .Values.api.computeCpu | quote }}
  {{- end }}
  {{- if .Values.api.computeMemory }}
  LAKEON_COMPUTE_MEMORY: {{ .Values.api.computeMemory | quote }}
  {{- end }}
  {{- if .Values.api.kbWriteCpu }}
  LAKEON_KB_WRITE_CPU: {{ .Values.api.kbWriteCpu | quote }}
  {{- end }}
  {{- if .Values.api.kbWriteMemory }}
  LAKEON_KB_WRITE_MEMORY: {{ .Values.api.kbWriteMemory | quote }}
  {{- end }}
  LAKEON_API_PORT: {{ .Values.api.port | quote }}
  {{- if .Values.api.ssl.enabled }}
  LAKEON_SSL_ENABLED: "true"
  {{- end }}
  {{- if .Values.obs.endpoint }}
  LAKEON_OBS_ENDPOINT: {{ .Values.obs.endpoint | quote }}
  {{- end }}
  LAKEON_OBS_BUCKET: {{ .Values.obs.bucket | default "lakeon-storage" | quote }}
  LAKEON_OBS_REGION: {{ .Values.obs.region | default "cn-north-4" | quote }}
  {{- if .Values.proxy.externalHost }}
  LAKEON_PROXY_EXTERNAL_HOST: {{ .Values.proxy.externalHost | quote }}
  {{- end }}
  LAKEON_PROXY_EXTERNAL_PORT: {{ .Values.proxy.listenPort | quote }}
  {{- if .Values.global.imagePullSecrets }}
  LAKEON_IMAGE_PULL_SECRETS: {{ range $i, $s := .Values.global.imagePullSecrets }}{{ if $i }},{{ end }}{{ $s.name }}{{ end }}
  {{- end }}
  {{- with .Values.cost }}
  LAKEON_COST_CCE_CLUSTER_HOURLY: {{ .cceClusterHourly | default "1.0" | quote }}
  LAKEON_COST_CCE_NODE_HOURLY: {{ .cceNodeHourly | default "1.5" | quote }}
  LAKEON_COST_CCE_NODE_COUNT: {{ .cceNodeCount | default "3" | quote }}
  LAKEON_COST_ELB_MONTHLY: {{ .elbMonthly | default "30" | quote }}
  LAKEON_COST_OBS_PER_GB_MONTHLY: {{ .obsPerGbMonthly | default "0.099" | quote }}
  LAKEON_COST_RDS_MONTHLY: {{ .rdsMonthly | default "500" | quote }}
  LAKEON_COST_EIP_MONTHLY: {{ .eipMonthly | default "150" | quote }}
  LAKEON_COST_COMPUTE_CU_HOURLY: {{ .computeCuHourly | default "0.5" | quote }}
  {{- end }}
  {{- if .Values.cloud }}
  {{- if .Values.cloud.resourceIds }}
  LAKEON_CLOUD_RESOURCE_IDS: {{ .Values.cloud.resourceIds | join "," | quote }}
  {{- end }}
  {{- if .Values.cloud.consoleRegion }}
  LAKEON_CLOUD_CONSOLE_REGION: {{ .Values.cloud.consoleRegion | quote }}
  {{- end }}
  {{- if .Values.cloud.cceClusterId }}
  LAKEON_CLOUD_CCE_CLUSTER_ID: {{ .Values.cloud.cceClusterId | quote }}
  {{- end }}
  {{- if .Values.cloud.rdsInstanceId }}
  LAKEON_CLOUD_RDS_INSTANCE_ID: {{ .Values.cloud.rdsInstanceId | quote }}
  {{- end }}
  {{- if .Values.cloud.elbId }}
  LAKEON_CLOUD_ELB_ID: {{ .Values.cloud.elbId | quote }}
  {{- end }}
  {{- if .Values.cloud.eipId }}
  LAKEON_CLOUD_EIP_ID: {{ .Values.cloud.eipId | quote }}
  {{- end }}
  {{- if .Values.cloud.nodePoolId }}
  LAKEON_CLOUD_NODE_POOL_ID: {{ .Values.cloud.nodePoolId | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.sync }}
  {{- if .Values.sync.pollIntervalMs }}
  LAKEON_SYNC_POLL_INTERVAL_MS: {{ .Values.sync.pollIntervalMs | quote }}
  {{- end }}
  {{- if .Values.sync.walWarnBytes }}
  LAKEON_SYNC_WAL_WARN_BYTES: {{ .Values.sync.walWarnBytes | quote }}
  {{- end }}
  {{- if .Values.sync.maxTasks }}
  LAKEON_SYNC_MAX_TASKS: {{ .Values.sync.maxTasks | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.api.computeNodeSelector }}
  LAKEON_COMPUTE_NODE_SELECTOR: {{ range $key, $value := .Values.api.computeNodeSelector }}{{ $key }}={{ $value }},{{ end }}
  {{- end }}
  {{- if .Values.api.ai }}
  {{- if .Values.api.ai.baseUrl }}
  LAKEON_AI_BASE_URL: {{ .Values.api.ai.baseUrl | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.api.inviteRequired }}
  LAKEON_INVITE_REQUIRED: "true"
  {{- end }}
  {{- if .Values.api.suspendPodRetainMinutes }}
  LAKEON_SUSPEND_POD_RETAIN_MINUTES: {{ .Values.api.suspendPodRetainMinutes | quote }}
  {{- end }}
  {{- with .Values.alert }}
  {{- if .smnTopicUrn }}
  LAKEON_ALERT_SMN_TOPIC_URN: {{ .smnTopicUrn | quote }}
  {{- end }}
  {{- if .smnRegion }}
  LAKEON_ALERT_SMN_REGION: {{ .smnRegion | default "cn-north-4" | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.knowledgeJobImage }}
  LAKEON_JOB_IMAGE_DOCUMENT_PARSE: {{ .Values.knowledgeJobImage | quote }}
  LAKEON_JOB_IMAGE_EMBEDDING: {{ .Values.knowledgeJobImage | quote }}
  LAKEON_JOB_IMAGE_EXPORT_PARQUET: {{ .Values.knowledgeJobImage | quote }}
  {{- end }}
  {{- if .Values.api.jobCallbackBaseUrl }}
  LAKEON_JOB_CALLBACK_BASE_URL: {{ .Values.api.jobCallbackBaseUrl | quote }}
  {{- end }}
  {{- with .Values.datalake }}
  LAKEON_DATALAKE_CCI_NS_PREFIX: {{ .cciNamespacePrefix | quote }}
  LAKEON_DATALAKE_VK_NODE_SELECTOR_KEY: {{ .vkNodeSelectorKey | quote }}
  LAKEON_DATALAKE_VK_NODE_SELECTOR_VALUE: {{ .vkNodeSelectorValue | quote }}
  LAKEON_DATALAKE_POLL_INTERVAL_MS: {{ .pollIntervalMs | quote }}
  LAKEON_DATALAKE_IMAGE_PYTHON_SLIM: {{ .images.pythonSlim | quote }}
  LAKEON_DATALAKE_IMAGE_PYTHON_DATA: {{ .images.pythonData | quote }}
  LAKEON_DATALAKE_IMAGE_RAY: {{ .images.ray | quote }}
  LAKEON_DATALAKE_IMAGE_RAY_GPU: {{ .images.rayGpu | quote }}
  {{- end }}
