apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: safekeeper
  namespace: {{ .Values.global.namespace }}
  labels:
    app: safekeeper
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  serviceName: safekeeper
  replicas: {{ .Values.safekeeper.replicas }}
  selector:
    matchLabels:
      app: safekeeper
  template:
    metadata:
      labels:
        app: safekeeper
    spec:
      initContainers:
        - name: compute-id
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # 从 Pod 名称 safekeeper-N 中提取数字 ID（从 1 开始）
              ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              SK_ID=$((ORDINAL + 1))
              echo $SK_ID > /config/safekeeper-id
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: safekeeper
          image: "{{ .Values.neon.image.repository }}:{{ .Values.neon.image.tag }}"
          imagePullPolicy: {{ .Values.neon.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              SK_ID=$(cat /config/safekeeper-id)
              exec safekeeper \
                --listen-pg=0.0.0.0:{{ .Values.safekeeper.pgPort }} \
                --listen-http=0.0.0.0:{{ .Values.safekeeper.httpPort }} \
                --id=$SK_ID \
                --broker-endpoint=http://storage-broker:{{ .Values.storageBroker.port }} \
                --advertise-url=$(POD_NAME).safekeeper.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.safekeeper.pgPort }} \
                -D /data \
                --remote-storage="{endpoint='{{ .Values.obs.endpoint }}', bucket_name='{{ .Values.obs.bucket }}', bucket_region='{{ .Values.obs.region }}', prefix_in_bucket='/safekeeper/'}"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: secret-key
          ports:
            - containerPort: {{ .Values.safekeeper.pgPort }}
              name: pg
            - containerPort: {{ .Values.safekeeper.httpPort }}
              name: http
          resources:
            {{- toYaml .Values.safekeeper.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: config
          emptyDir: {}
        - name: data
          emptyDir: {}
