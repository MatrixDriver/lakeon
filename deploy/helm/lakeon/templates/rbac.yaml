apiVersion: v1
kind: ServiceAccount
metadata:
  name: lakeon-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lakeon-api-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakeon-api-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lakeon-api-manager
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
---
# ClusterRole for metrics API and node info (used by SRE infra page)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lakeon-api-metrics-reader
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lakeon-api-metrics-reader
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lakeon-api-metrics-reader
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
---
{{- if include "lakeon.dataPlaneEnabled" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lakeon-compute-manager
  namespace: {{ .Values.dataPlane.computeNamespace | default "lakeon-compute" }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "patch"]
---
{{- end }}
---
# ClusterRole for datalake: namespace creation + job management across datalake-* namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lakeon-api-datalake-manager
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
  - apiGroups: ["ray.io"]
    resources: ["rayjobs", "rayjobs/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "create", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "create", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lakeon-api-datalake-manager
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lakeon-api-datalake-manager
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
---
# Pipeline Orchestrator — ServiceAccount + RBAC for RayJob CRD management
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-orchestrator-rayjob-manager
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: ["ray.io"]
    resources: ["rayjobs", "rayjobs/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-orchestrator-rayjob-manager
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-orchestrator-rayjob-manager
subjects:
  - kind: ServiceAccount
    name: pipeline-orchestrator
    namespace: {{ .Values.global.namespace }}
---
{{- if include "lakeon.dataPlaneEnabled" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakeon-api-compute-manager
  namespace: {{ .Values.dataPlane.computeNamespace | default "lakeon-compute" }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lakeon-compute-manager
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
{{- end }}
