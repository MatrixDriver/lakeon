apiVersion: v1
kind: ServiceAccount
metadata:
  name: lakeon-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lakeon-api-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakeon-api-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lakeon-api-manager
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
---
# ClusterRole for metrics API and node info (used by SRE infra page)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lakeon-api-metrics-reader
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lakeon-api-metrics-reader
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lakeon-api-metrics-reader
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lakeon-compute-manager
  namespace: lakeon-compute
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakeon-api-compute-manager
  namespace: lakeon-compute
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lakeon-compute-manager
subjects:
  - kind: ServiceAccount
    name: lakeon-api
    namespace: {{ .Values.global.namespace }}
