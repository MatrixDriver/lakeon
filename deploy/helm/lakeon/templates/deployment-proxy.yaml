{{- if include "lakeon.dataPlaneEnabled" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proxy
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.proxy.replicas }}
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7000"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: "{{ .Values.neon.image.repository }}:{{ .Values.neon.image.tag }}"
          imagePullPolicy: {{ .Values.neon.image.pullPolicy }}
          command: ["proxy"]
          args:
            - "--proxy=0.0.0.0:{{ .Values.proxy.listenPort }}"
            - "--auth-backend=control-plane"
            - "--auth-endpoint={{ .Values.proxy.authEndpoint | default (printf "http://lakeon-api:%v/proxy" (.Values.api.internalPort | default 8088)) }}"
            - "--wss=0.0.0.0:{{ .Values.proxy.httpPort }}"
            - "--mgmt=127.0.0.1:{{ .Values.proxy.mgmtPort }}"
            {{- if .Values.proxy.tls.enabled }}
            - "--tls-key=/tls/tls.key"
            - "--tls-cert=/tls/tls.crt"
            {{- end }}
          env:
            - name: NEON_PROXY_TO_CONTROLPLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: proxy-token
          ports:
            - containerPort: {{ .Values.proxy.listenPort }}
              name: pg
            - containerPort: {{ .Values.proxy.httpPort }}
              name: http
          {{- if .Values.proxy.tls.enabled }}
          volumeMounts:
            - name: tls-cert
              mountPath: /tls
              readOnly: true
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: pg
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: pg
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
      {{- if .Values.proxy.tls.enabled }}
      volumes:
        - name: tls-cert
          secret:
            secretName: {{ .Values.proxy.tls.secretName }}
      {{- end }}
{{- end }}
