{{- if and (include "lakeon.controlPlaneEnabled" .) .Values.api.split.enabled .Values.api.publicElb.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: api-gateway
    {{- include "lakeon.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.api.port }} ssl;
      server_name _;

      ssl_certificate /tmp/api-gateway.crt;
      ssl_certificate_key /tmp/api-gateway.key;
      ssl_protocols TLSv1.2 TLSv1.3;

      add_header X-Lakeon-Api-Gateway split always;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_connect_timeout 5s;
      proxy_read_timeout 90s;

      location = /actuator/health {
        add_header Content-Type application/json;
        return 200 '{"status":"UP"}';
      }

      location /api/v1/admin/ {
        proxy_pass http://admin-api:{{ .Values.api.internalPort | default 8088 }};
      }

      location = /api/v1/admin {
        proxy_pass http://admin-api:{{ .Values.api.internalPort | default 8088 }};
      }

      location /proxy/ {
        proxy_pass http://serving-api:{{ .Values.api.internalPort | default 8088 }};
      }

      location /api/v1/ {
        proxy_pass http://serving-api:{{ .Values.api.internalPort | default 8088 }};
      }
    }
{{- end }}
