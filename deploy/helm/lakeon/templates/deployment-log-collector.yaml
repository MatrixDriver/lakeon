{{- if .Values.fluentbit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-collector
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: log-collector
          image: "{{ .Values.logCollector.image.repository }}:{{ .Values.logCollector.image.tag }}"
          ports:
            - containerPort: 9880
              name: http
          env:
            - name: LOG_DB_DSN
              value: {{ .Values.api.logDbDsn | quote }}
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: log-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: log-collector
  ports:
    - port: 9880
      targetPort: http
      protocol: TCP
      name: http
{{- end }}
