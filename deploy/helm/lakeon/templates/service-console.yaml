{{- if .Values.console.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: lakeon-console
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  type: {{ .Values.console.serviceType }}
  ports:
    - port: {{ .Values.console.port }}
      targetPort: {{ .Values.console.port }}
      protocol: TCP
      {{- if and (eq .Values.console.serviceType "NodePort") .Values.console.nodePort }}
      nodePort: {{ .Values.console.nodePort }}
      {{- end }}
  selector:
    app: lakeon-console
{{- end }}
