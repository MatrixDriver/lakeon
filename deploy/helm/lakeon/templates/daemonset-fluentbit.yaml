{{- if .Values.fluentbit.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lakeon-fluentbit
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lakeon-fluentbit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakeon-fluentbit
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fluentbit
          image: {{ .Values.fluentbit.image }}
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: fluentbit-config
              mountPath: /fluent-bit/etc
          resources:
            {{- toYaml .Values.fluentbit.resources | nindent 12 }}
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: fluentbit-config
          configMap:
            name: fluentbit-config
      tolerations:
        - key: lakeon/role
          operator: Exists
          effect: NoSchedule
{{- end }}
