{{- if .Values.nodeInit.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lakeon-node-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-init
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lakeon-node-init
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakeon-node-init
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostPID: true
      {{- if and .Values.neon .Values.neon.computeImage .Values.neon.computeImage.repository }}
      initContainers:
        - name: prepull-compute
          image: {{ .Values.neon.computeImage.repository }}:{{ .Values.neon.computeImage.tag | default "latest" }}
          command: ["/bin/sh", "-c", "echo compute image pre-pulled on $(hostname)"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      {{- end }}
      containers:
        - name: node-init
          image: {{ .Values.nodeInit.image | default "busybox:1.36" }}
          command:
            - /bin/sh
            - -c
            - |
              # Fix containerd core ulimit for Neon compute_ctl compatibility.
              # compute_ctl calls setrlimit(RLIMIT_CORE, INFINITY) on startup,
              # which fails if containerd's LimitCORE is less than infinity.
              # See: doc/neon-modifications.md
              CONF_DIR="/host/etc/systemd/system/containerd.service.d"
              CONF_FILE="$CONF_DIR/ulimit-core.conf"
              EXPECTED="[Service]\nLimitCORE=infinity"

              if [ -f "$CONF_FILE" ] && grep -q "LimitCORE=infinity" "$CONF_FILE"; then
                echo "containerd core ulimit already configured, sleeping."
              else
                echo "Configuring containerd core ulimit..."
                mkdir -p "$CONF_DIR"
                printf '[Service]\nLimitCORE=infinity\n' > "$CONF_FILE"
                # Use nsenter to run systemctl on the host
                nsenter -t 1 -m -u -i -n -- systemctl daemon-reload
                nsenter -t 1 -m -u -i -n -- systemctl restart containerd
                echo "containerd restarted with LimitCORE=infinity."
              fi

              # Sleep forever — DaemonSet must keep running
              while true; do sleep 86400; done
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc
              mountPath: /host/etc
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
      tolerations:
        - operator: Exists
{{- end }}
