{{- if .Values.memory.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: lakeon-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakeon-memory
  template:
    metadata:
      labels:
        app: lakeon-memory
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: memory
          image: {{ .Values.memory.image }}
          ports:
            - containerPort: 8001
          env:
            - name: EMBEDDING_API_URL
              value: {{ .Values.embedding.apiUrl | default "https://api.siliconflow.cn/v1/embeddings" }}
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lakeon-secrets
                  key: embedding-api-key
                  optional: true
            - name: EMBEDDING_MODEL
              value: {{ .Values.embedding.model | default "BAAI/bge-m3" }}
            - name: CHAT_API_URL
              value: {{ .Values.memory.chatApiUrl | default "https://api.siliconflow.cn/v1" }}
            - name: CHAT_MODEL
              value: {{ .Values.memory.chatModel | default "Qwen/Qwen2.5-7B-Instruct" }}
            - name: CHAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lakeon-secrets
                  key: embedding-api-key
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.memory.cpu | default "500m" }}
              memory: {{ .Values.memory.memorySize | default "512Mi" }}
            limits:
              cpu: {{ .Values.memory.cpu | default "500m" }}
              memory: {{ .Values.memory.memorySize | default "512Mi" }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: memory-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: lakeon-memory
  ports:
    - port: 8001
      targetPort: 8001
{{- end }}
