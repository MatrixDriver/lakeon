apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakeon-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lakeon-api
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lakeon-api
  template:
    metadata:
      labels:
        app: lakeon-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.api.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: lakeon-api
      containers:
        - name: lakeon-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: lakeon-api-config
          env:
            - name: LAKEON_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: db-password
            - name: LAKEON_PROXY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: proxy-token
            - name: LAKEON_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: admin-token
            {{- if .Values.obs.accessKey }}
            - name: LAKEON_OBS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: access-key
            - name: LAKEON_OBS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: obs-credentials
                  key: secret-key
            {{- end }}
          volumeMounts:
            - name: cloud-resources
              mountPath: /app/data/cloud-resources.json
              subPath: resources.json
              readOnly: true
            {{- if .Values.api.ssl.enabled }}
            - name: tls-keystore
              mountPath: /app/secrets
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
              {{- if .Values.api.ssl.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
              {{- if .Values.api.ssl.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: cloud-resources
          configMap:
            name: lakeon-cloud-resources
            optional: true
        {{- if .Values.api.ssl.enabled }}
        - name: tls-keystore
          secret:
            secretName: api-keystore
        {{- end }}
