apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
type: Opaque
data:
  proxy-token: {{ default "" .Values.api.proxyToken | b64enc | quote }}
  db-password: {{ .Values.metadataDb.password | b64enc | quote }}
  admin-token: {{ default "" .Values.api.adminToken | b64enc | quote }}
  ai-api-key: {{ default "" .Values.api.aiApiKey | b64enc | quote }}
  connector-secret-key: {{ required "api.connectorSecretKey is required and must be a non-default 16, 24, or 32 byte key" .Values.api.connectorSecretKey | b64enc | quote }}
