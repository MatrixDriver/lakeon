{{- $controlEnabled := include "lakeon.controlPlaneEnabled" . -}}
{{- $connectorSecretKey := .Values.api.connectorSecretKey | default "" -}}
{{- if $controlEnabled -}}
{{- $connectorSecretKey = required "api.connectorSecretKey is required and must be a non-default 16, 24, or 32 byte key" .Values.api.connectorSecretKey -}}
{{- $connectorSecretKeyLen := len $connectorSecretKey -}}
{{- if eq $connectorSecretKey "0123456789abcdef0123456789abcdef" -}}
{{- fail "api.connectorSecretKey must not use the old public default key" -}}
{{- end -}}
{{- if not (or (eq $connectorSecretKeyLen 16) (eq $connectorSecretKeyLen 24) (eq $connectorSecretKeyLen 32)) -}}
{{- fail "api.connectorSecretKey must be 16, 24, or 32 characters" -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
type: Opaque
data:
  proxy-token: {{ default "" .Values.api.proxyToken | b64enc | quote }}
  db-password: {{ .Values.metadataDb.password | b64enc | quote }}
  admin-token: {{ default "" .Values.api.adminToken | b64enc | quote }}
  ai-api-key: {{ default "" .Values.api.aiApiKey | b64enc | quote }}
  connector-secret-key: {{ $connectorSecretKey | b64enc | quote }}
  data-plane-kube-token: {{ default "" .Values.dataPlane.kubeToken | b64enc | quote }}
  metadata-db-url: {{ printf "postgresql://%s:%s@%s:%v/%s" .Values.metadataDb.user .Values.metadataDb.password .Values.metadataDb.host .Values.metadataDb.port .Values.metadataDb.name | b64enc | quote }}
