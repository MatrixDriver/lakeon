{{- $controlEnabled := include "lakeon.controlPlaneEnabled" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
type: Opaque
data:
  proxy-token: {{ default "" .Values.api.proxyToken | b64enc | quote }}
  db-password: {{ .Values.metadataDb.password | b64enc | quote }}
  admin-token: {{ default "" .Values.api.adminToken | b64enc | quote }}
  ai-api-key: {{ default "" .Values.api.aiApiKey | b64enc | quote }}
  data-plane-kube-token: {{ default "" .Values.dataPlane.kubeToken | b64enc | quote }}
  metadata-db-url: {{ printf "postgresql://%s:%s@%s:%v/%s" .Values.metadataDb.user .Values.metadataDb.password .Values.metadataDb.host .Values.metadataDb.port .Values.metadataDb.name | b64enc | quote }}
