{{- if include "lakeon.dataPlaneEnabled" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-broker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: storage-broker
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.storageBroker.replicas }}
  selector:
    matchLabels:
      app: storage-broker
  template:
    metadata:
      labels:
        app: storage-broker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: storage-broker
          image: "{{ .Values.neon.image.repository }}:{{ .Values.neon.image.tag }}"
          imagePullPolicy: {{ .Values.neon.image.pullPolicy }}
          command: ["storage_broker"]
          args:
            - "--listen-addr=0.0.0.0:{{ .Values.storageBroker.port }}"
          ports:
            - containerPort: {{ .Values.storageBroker.port }}
              name: grpc
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
{{- end }}
