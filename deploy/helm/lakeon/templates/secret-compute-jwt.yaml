{{- if and .Values.computeJwt.privateKey (include "lakeon.controlPlaneEnabled" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: lakeon-compute-jwt
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
type: Opaque
stringData:
  private-key: {{ .Values.computeJwt.privateKey | quote }}
  public-jwk: {{ .Values.computeJwt.publicJwk | quote }}
  kid: {{ .Values.computeJwt.kid | quote }}
{{- end }}
