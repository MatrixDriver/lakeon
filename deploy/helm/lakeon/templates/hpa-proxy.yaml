{{- if and (include "lakeon.dataPlaneEnabled" .) .Values.proxy.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proxy
    {{- include "lakeon.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proxy
  minReplicas: {{ .Values.proxy.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.proxy.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.proxy.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
