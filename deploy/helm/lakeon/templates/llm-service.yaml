{{- if .Values.llm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: lakeon-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakeon-llm
  template:
    metadata:
      labels:
        app: lakeon-llm
    spec:
      nodeSelector:
        lakeon/role: gpu
      containers:
        - name: llm
          image: {{ .Values.llm.image }}
          args:
            - "--model"
            - "{{ .Values.llm.model | default "Qwen/Qwen3.5-9B" }}"
            - "--port"
            - "8080"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "{{ .Values.llm.maxModelLen | default 8192 | toString }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.llm.gpuMemoryUtilization | default 0.6 | toString }}"
            - "--trust-remote-code"
          {{- if .Values.llm.hfMirror }}
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.llm.hfMirror }}"
          {{- end }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: lakeon-llm
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
