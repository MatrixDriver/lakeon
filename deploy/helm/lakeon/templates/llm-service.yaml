{{- if .Values.llm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: lakeon-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakeon-llm
  template:
    metadata:
      labels:
        app: lakeon-llm
    spec:
      nodeSelector:
        lakeon/role: gpu
      containers:
        - name: llm
          image: {{ .Values.llm.image }}
          args:
            - "--model"
            - "{{ .Values.llm.modelPath | default "/models/Qwen3.5-9B" }}"
            - "--port"
            - "8080"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "{{ .Values.llm.maxModelLen | default 8192 | toString }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.llm.gpuMemoryUtilization | default 0.6 | toString }}"
            - "--trust-remote-code"
            {{- if .Values.llm.quantization }}
            - "--quantization"
            - "{{ .Values.llm.quantization }}"
            {{- end }}
          env:
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HUB_OFFLINE
              value: "1"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 600
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: model-cache
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: lakeon-llm
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
