# hwstaff control-plane CCE overrides.
# Use together with values.yaml:
#   helm ... -f values.yaml -f values-control-plane.yaml

plane:
  mode: control

api:
  replicas: 2
  serviceType: LoadBalancer
  elb:
    id: ""
    class: "performance"
    autocreate: '{"type":"inner","name":"dbay-control-api-inner-elb","l4_flavor_id":"ec6df27e-8ae9-45e3-828f-a6de45e3e109","available_zone":["cn-north-4a","cn-north-4c"]}'
  publicElb:
    enabled: true
    id: "46b20c38-5c54-4781-9f00-d25d8c1717a8"
    class: "performance"
    port: 8443
    internalPort: 8088
  ingress:
    # Staged L7 gateway config. Enable after binding a TLS cert to the CCE
    # Ingress/ELB listener; the current public Service keeps TCP TLS passthrough.
    enabled: false
    name: lakeon-api-gateway
    className: "cce"
    host: "api.dbay.cloud"
    port: 8443
    backendPort: 8088
    annotations:
      kubernetes.io/ingress.class: "cce"
      kubernetes.io/elb.id: "46b20c38-5c54-4781-9f00-d25d8c1717a8"
      kubernetes.io/elb.class: "performance"
      kubernetes.io/elb.port: "8443"
  split:
    enabled: true
    components:
      serving:
        name: serving-api
        replicas: 1
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 3
          targetCPUUtilizationPercentage: 70
      admin:
        name: admin-api
        replicas: 1
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 2
          targetCPUUtilizationPercentage: 70
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

fluentbit:
  enabled: false

logCollector:
  enabled: false

dataPlane:
  namespace: lakeon
  computeNamespace: lakeon-compute
  pageserverReplicas: 3
  pageserverDiscovery:
    enabled: true
    namespace: lakeon
    labelSelector: "app=pageserver"
    headlessService: "pageserver-headless"
    httpPort: 9898
    pgPort: 6400
  pageserverUrl: "http://pageserver.lakeon.svc.cluster.local:9898"
  safekeeperUrls: "safekeeper-0.safekeeper.lakeon.svc.cluster.local:5454,safekeeper-1.safekeeper.lakeon.svc.cluster.local:5454,safekeeper-2.safekeeper.lakeon.svc.cluster.local:5454"
  storageBrokerUrl: "http://storage-broker.lakeon.svc.cluster.local:50051"
  kubeApiServer: ""
  kubeToken: ""
  kubeCaB64: ""

dicer:
  enabled: true
  replicas: 2
  liveLoadEnabled: true
  liveLoadPollIntervalMs: 10000
  liveLoadInitialDelayMs: 5000
  metricsTimeoutMs: 1500
  snapshotTtlMs: 30000
  autoFailoverEnabled: true
  autoFailoverPollIntervalMs: 15000
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/flex/dicer-assigner
    tag: "5cce7985"
    pullPolicy: IfNotPresent
  location:
    kubernetesClusterUri: "kubernetes-cluster:prod/huawei/public/cn-north-4/control/01"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

proxy:
  replicas: 0

pageserver:
  replicas: 0

safekeeper:
  replicas: 0

storageBroker:
  replicas: 0

admin:
  enabled: false

console:
  enabled: false
