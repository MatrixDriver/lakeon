# Stage 3: 华为云 CCE 开发集群配置
#
# 用法:
#   helm upgrade --install lakeon deploy/helm/lakeon \
#     -f deploy/cce/values-cce.yaml \
#     --set obs.accessKey=$OBS_AK --set obs.secretKey=$OBS_SK \
#     --set metadataDb.host=$RDS_PRIVATE_IP --set metadataDb.password=$RDS_PASSWORD \
#     -n lakeon --timeout 5m --no-hooks
#
# 前置条件:
#   1. CCE 集群已创建，kubeconfig 已切换到目标 context
#   2. 镜像已推送到 SWR（deploy/cce/push-images.sh）
#   3. RDS 与 CCE 在同一 VPC，使用私有 IP 直连
#   4. 安全组放通 5432（RDS）和 443（OBS）出方向
#
# 环境变量（通过 --set 传递，不入库）:
#   OBS_AK           — OBS AccessKey
#   OBS_SK           — OBS SecretKey
#   RDS_PRIVATE_IP   — RDS 内网地址
#   RDS_PASSWORD     — RDS lakeon 用户密码

# ── SWR 镜像拉取凭证 ─────────────────────────────────────────────
global:
  imagePullSecrets:
    - name: swr-secret

# ── SWR 镜像地址 ─────────────────────────────────────────────────
# 修改 SWR_ORG 为你的 SWR 组织名
initImage: "swr.cn-north-4.myhuaweicloud.com/lakeon/busybox:1.36"

neon:
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/lakeon/neon
    tag: latest
    pullPolicy: IfNotPresent
  computeImage:
    repository: swr.cn-north-4.myhuaweicloud.com/lakeon/compute-node-v17
    tag: latest

api:
  replicas: 1
  serviceType: NodePort
  adminToken: "lakeon-sre-2026"
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/lakeon/lakeon-api
    tag: "0.2.0"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ── Neon 组件（单副本开发模式，最小资源请求）─────────────────────
pageserver:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

safekeeper:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

storageBroker:
  replicas: 1

proxy:
  replicas: 1
  externalHost: "114.116.210.49"
  serviceType: LoadBalancer
  elb:
    id: "d9f5b32c-6b7f-4389-88a7-bae4ff97c6e7"
    class: "union"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── OBS（同 region 内网访问）────────────────────────────────────
obs:
  endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
  bucket: "lakeon-storage"
  region: "cn-north-4"
  accessKey: ""     # --set obs.accessKey=$OBS_AK
  secretKey: ""     # --set obs.secretKey=$OBS_SK
  usePathStyle: false

# ── 外部 RDS（VPC 内网直连）─────────────────────────────────────
metadataDb:
  enabled: false
  host: ""          # --set metadataDb.host=$RDS_PRIVATE_IP
  port: 5432
  name: "lakeon"
  user: "lakeon"
  password: ""      # --set metadataDb.password=$RDS_PASSWORD

# ── SRE 运维控制台 ────────────────────────────────────────────
admin:
  enabled: true
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/lakeon/lakeon-admin
    tag: "0.1.8"
  replicas: 1
  port: 80
  serviceType: LoadBalancer
  elb:
    id: "d9f5b32c-6b7f-4389-88a7-bae4ff97c6e7"
    class: "union"
    port: 8081        # ELB 监听端口，与 console(80) 区分
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ── Web 控制台 ─────────────────────────────────────────────────
console:
  enabled: true
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/lakeon/lakeon-console
    tag: "0.2.0"
  replicas: 1
  port: 80
  serviceType: LoadBalancer
  elb:
    id: "d9f5b32c-6b7f-4389-88a7-bae4ff97c6e7"
    class: "union"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ── 成本参数（匹配实际 CCE 资源）──────────────────────────────
cost:
  cceClusterHourly: "0.5"     # CCE 集群管理费 0.5元/h (含集群 EIP 0.5元/h = 合计 1元/h)
  cceNodeHourly: "2.0"        # ac7.2xlarge.2 (8C16G)
  cceNodeCount: "1"           # 1x 8C16G
  elbMonthly: "0"             # 共享型 ELB 免费，按流量另计
  obsPerGbMonthly: "0.099"
  rdsMonthly: "500"
  eipMonthly: "0"             # 服务 EIP 按流量计费，开发环境近乎免费
  computeCuHourly: "0.5"

# ── 节点初始化（修复 containerd core ulimit）─────────────────────
nodeInit:
  enabled: true
  image: "swr.cn-north-4.myhuaweicloud.com/lakeon/busybox:1.36"

# ── 禁用集群内组件 ─────────────────────────────────────────────
minio:
  enabled: false
