server:
  port: ${LAKEON_API_PORT:8080}
  ssl:
    enabled: ${LAKEON_SSL_ENABLED:false}
    key-store: ${LAKEON_SSL_KEYSTORE:/app/secrets/keystore.p12}
    key-store-type: PKCS12
    key-store-password: ${LAKEON_SSL_KEYSTORE_PASSWORD:changeit}

spring:
  datasource:
    url: ${LAKEON_DB_DSN:jdbc:postgresql://localhost:5432/lakeon}
    username: ${LAKEON_DB_USER:lakeon}
    password: ${LAKEON_DB_PASSWORD:lakeon}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

lakeon:
  neon:
    pageserver-url: ${LAKEON_NEON_PAGESERVER_URL:http://localhost:9898}
    safekeeper-urls: ${LAKEON_NEON_SAFEKEEPER_URLS:safekeeper1:5454,safekeeper2:5454,safekeeper3:5454}
    storage-broker-url: ${LAKEON_NEON_STORAGE_BROKER_URL:http://localhost:50051}
  obs:
    endpoint: ${LAKEON_OBS_ENDPOINT:}
    bucket: ${LAKEON_OBS_BUCKET:neon}
    region: ${LAKEON_OBS_REGION:cn-north-4}
    access-key: ${LAKEON_OBS_ACCESS_KEY:}
    secret-key: ${LAKEON_OBS_SECRET_KEY:}
  manifest:
    retry-fixed-delay-ms: ${LAKEON_MANIFEST_RETRY_FIXED_DELAY_MS:60000}
  proxy:
    internal-token: ${LAKEON_PROXY_INTERNAL_TOKEN:}
    external-host: ${LAKEON_PROXY_EXTERNAL_HOST:}
    external-port: ${LAKEON_PROXY_EXTERNAL_PORT:4432}
    internal-host: ${LAKEON_PROXY_INTERNAL_HOST:}
    internal-port: ${LAKEON_PROXY_INTERNAL_PORT:4432}
  data-plane:
    kube-api-server: ${LAKEON_DATA_PLANE_KUBE_API_SERVER:}
    kube-token: ${LAKEON_DATA_PLANE_KUBE_TOKEN:}
    kube-ca-b64: ${LAKEON_DATA_PLANE_KUBE_CA_B64:}
    namespace: ${LAKEON_DATA_PLANE_NAMESPACE:lakeon}
    compute-namespace: ${LAKEON_DATA_PLANE_COMPUTE_NAMESPACE:lakeon-compute}
  admin:
    token: ${LAKEON_ADMIN_TOKEN:}
  cost:
    cce-node-hourly: ${LAKEON_COST_CCE_NODE_HOURLY:1.5}
    cce-node-count: ${LAKEON_COST_CCE_NODE_COUNT:3}
    elb-monthly: ${LAKEON_COST_ELB_MONTHLY:30}
    obs-per-gb-monthly: ${LAKEON_COST_OBS_PER_GB_MONTHLY:0.099}
    rds-monthly: ${LAKEON_COST_RDS_MONTHLY:500}
    eip-monthly: ${LAKEON_COST_EIP_MONTHLY:150}
    compute-cu-hourly: ${LAKEON_COST_COMPUTE_CU_HOURLY:0.5}
  k8s:
    namespace: ${LAKEON_K8S_NAMESPACE:lakeon-compute}
    compute-image: ${LAKEON_COMPUTE_IMAGE:ghcr.io/neondatabase/compute-node-v17:latest}
    import-image: ${LAKEON_IMPORT_IMAGE:postgres:17}
    image-pull-secrets: ${LAKEON_IMAGE_PULL_SECRETS:}
    compute-cpu: ${LAKEON_COMPUTE_CPU:}
    compute-memory: ${LAKEON_COMPUTE_MEMORY:}
    compute-node-selector-raw: ${LAKEON_COMPUTE_NODE_SELECTOR:}
    node-pool-name: ${LAKEON_NODE_POOL_NAME:dbay-compute-pool}
    node-pool-min: ${LAKEON_NODE_POOL_MIN:1}
    node-pool-max: ${LAKEON_NODE_POOL_MAX:5}
    scale-down-unneeded-minutes: ${LAKEON_SCALE_DOWN_UNNEEDED_MINUTES:10}
  cloud:
    resource-ids: ${LAKEON_CLOUD_RESOURCE_IDS:}
    console-region: ${LAKEON_CLOUD_CONSOLE_REGION:cn-north-4}
    cce-cluster-id: ${LAKEON_CLOUD_CCE_CLUSTER_ID:}
    control-cce-cluster-id: ${LAKEON_CLOUD_CONTROL_CCE_CLUSTER_ID:}
    control-cce-cluster-name: ${LAKEON_CLOUD_CONTROL_CCE_CLUSTER_NAME:dbay-control-cce}
    data-cce-cluster-id: ${LAKEON_CLOUD_DATA_CCE_CLUSTER_ID:}
    data-cce-cluster-name: ${LAKEON_CLOUD_DATA_CCE_CLUSTER_NAME:dbay-cce}
    rds-instance-id: ${LAKEON_CLOUD_RDS_INSTANCE_ID:}
    elb-id: ${LAKEON_CLOUD_ELB_ID:}
    eip-id: ${LAKEON_CLOUD_EIP_ID:}
    node-pool-id: ${LAKEON_CLOUD_NODE_POOL_ID:}
    public-api-elb-id: ${LAKEON_CLOUD_PUBLIC_API_ELB_ID:}
    control-private-elb-ip: ${LAKEON_CLOUD_CONTROL_PRIVATE_ELB_IP:}
  alert:
    smn-topic-urn: ${LAKEON_ALERT_SMN_TOPIC_URN:}
    smn-region: ${LAKEON_ALERT_SMN_REGION:cn-north-4}
  ai:
    api-key: ${LAKEON_AI_API_KEY:}
    base-url: ${LAKEON_AI_BASE_URL:https://api.modelarts-maas.com/openai/v1}
    model: ${LAKEON_AI_MODEL:deepseek-v3.2}
  invite-required: ${LAKEON_INVITE_REQUIRED:false}
  suspend:
    pod-retain-minutes: ${LAKEON_SUSPEND_POD_RETAIN_MINUTES:30}
  sync:
    poll-interval-ms: ${LAKEON_SYNC_POLL_INTERVAL_MS:30000}
    wal-warn-bytes: ${LAKEON_SYNC_WAL_WARN_BYTES:1073741824}
    max-tasks: ${LAKEON_SYNC_MAX_TASKS:10}
  defaults:
    compute-size: ${LAKEON_DEFAULT_COMPUTE_SIZE:1cu}
    suspend-timeout: ${LAKEON_DEFAULT_SUSPEND_TIMEOUT:2m}
    storage-limit-gb: ${LAKEON_DEFAULT_STORAGE_LIMIT:10}
  hwcloud:
    account-id: ${LAKEON_HWCLOUD_ACCOUNT_ID:}
  job:
    timeout-minutes: ${LAKEON_JOB_TIMEOUT_MINUTES:30}
    pending-timeout-minutes: ${LAKEON_JOB_PENDING_TIMEOUT_MINUTES:5}
    orphan-check-interval-ms: ${LAKEON_JOB_ORPHAN_CHECK_INTERVAL_MS:60000}
    callback-base-url: ${LAKEON_JOB_CALLBACK_BASE_URL:}
    namespace: ${LAKEON_JOB_NAMESPACE:}
    use-cci: ${LAKEON_JOB_USE_CCI:false}
    types:
      document-parse:
        image: ${LAKEON_JOB_IMAGE_DOCUMENT_PARSE:swr.cn-north-4.myhuaweicloud.com/flex/lakeon-knowledge-job:0.2.1}
        cpu: ${LAKEON_JOB_CPU_DOCUMENT_PARSE:1}
        memory: ${LAKEON_JOB_MEMORY_DOCUMENT_PARSE:2Gi}
      embedding:
        image: ${LAKEON_JOB_IMAGE_EMBEDDING:swr.cn-north-4.myhuaweicloud.com/flex/lakeon-knowledge-job:0.2.1}
        cpu: ${LAKEON_JOB_CPU_EMBEDDING:500m}
        memory: ${LAKEON_JOB_MEMORY_EMBEDDING:512Mi}
      export-parquet:
        image: ${LAKEON_JOB_IMAGE_EXPORT_PARQUET:swr.cn-north-4.myhuaweicloud.com/flex/lakeon-knowledge-job:0.2.1}
        cpu: ${LAKEON_JOB_CPU_EXPORT_PARQUET:1}
        memory: ${LAKEON_JOB_MEMORY_EXPORT_PARQUET:2Gi}
      training:
        image: ${LAKEON_JOB_IMAGE_TRAINING:rayproject/ray:2.44.1-py312}
        cpu: "4"
        memory: "8Gi"
  log:
    db-dsn: "${LOG_DB_DSN:}"
  compute-jwt:
    private-key: ${COMPUTE_JWT_PRIVATE_KEY:}
    public-jwk: ${COMPUTE_JWT_PUBLIC_JWK:}
    kid: ${COMPUTE_JWT_KID:lakeon-compute-1}
  compute-warm-pool:
    enabled: ${COMPUTE_WARM_POOL_ENABLED:false}
    size: ${COMPUTE_WARM_POOL_SIZE:2}
    pod-label-value: warm
    mock-tenant-id: ${COMPUTE_WARM_POOL_MOCK_TENANT_ID:}
    mock-timeline-id: ${COMPUTE_WARM_POOL_MOCK_TIMELINE_ID:}
    image: ${COMPUTE_WARM_POOL_IMAGE:}
    reconfigure-timeout-ms: 5000
    compute-ctl-port: 3080
  oauth:
    callback-base-url: ${LAKEON_OAUTH_CALLBACK_BASE_URL:http://localhost:8080}
    relay-base-url: ${LAKEON_OAUTH_RELAY_BASE_URL:}
    google:
      client-id: ${LAKEON_OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${LAKEON_OAUTH_GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${LAKEON_OAUTH_GITHUB_CLIENT_ID:}
      client-secret: ${LAKEON_OAUTH_GITHUB_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
