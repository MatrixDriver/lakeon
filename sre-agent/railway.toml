[build]
builder = "DOCKERFILE"
dockerfilePath = "sre-agent/Dockerfile"
# Only rebuild when our code or dbay-sre-mcp changes
watchPatterns = [
  "sre-agent/**",
  "dbay-sre-mcp/**",
]

[deploy]
startCommand = "/app/entrypoint.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# No healthcheckPath — hermes gateway is a WebSocket client, not an HTTP server.
# Railway will consider the service healthy if the process stays alive.

# IMPORTANT: The hermes data volume must be provisioned in the Railway dashboard
# (Service → Settings → Volumes) with mount path /data/hermes. Without this,
# session data is lost on every redeploy. See docs/DEPLOY_RUNBOOK.md.
