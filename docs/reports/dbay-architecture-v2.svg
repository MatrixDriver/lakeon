<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e056fd;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#e056fd;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad-mcp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e056fd;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.15" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8ecae6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0d0d1a"/>

  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d2ff" text-anchor="middle">DBay 数据港湾 - 系统架构</text>
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="14" fill="#8ecae6" text-anchor="middle">面向 Agent 的 Serverless 数据底座</text>

  <!-- Top: MCP Agent Access Layer -->
  <rect x="100" y="75" width="1000" height="80" rx="10" fill="url(#grad-mcp)" stroke="#e056fd" stroke-width="2"/>
  <text x="600" y="98" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e056fd" text-anchor="middle">MCP 协议接入层</text>
  <text x="220" y="120" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">Knowledge MCP Server</text>
  <text x="450" y="120" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">Memory MCP Server</text>
  <text x="700" y="120" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">多 Agent 接入 (Claude / GPT / ...)</text>
  <text x="950" y="120" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">标准化工具协议</text>
  <text x="600" y="144" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#e056fd" text-anchor="middle">核心技术：标准工具协议 · 多 Agent 编排</text>

  <!-- Connection: MCP -> KB/Memory -->
  <line x1="220" y1="155" x2="220" y2="185" stroke="#e056fd" stroke-width="2"/>
  <line x1="480" y1="155" x2="480" y2="185" stroke="#e056fd" stroke-width="2"/>

  <!-- Middle Left: Knowledge Base -->
  <rect x="100" y="185" width="240" height="230" rx="10" fill="url(#grad2)" stroke="#ffd700" stroke-width="2"/>
  <text x="220" y="213" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffd700" text-anchor="middle">知识库</text>
  <text x="220" y="238" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 文档解析</text>
  <text x="220" y="260" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 向量检索 (pgvector)</text>
  <text x="220" y="282" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 全文搜索 (tsvector)</text>
  <text x="220" y="304" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 表知识库</text>
  <text x="220" y="326" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 切片管理 + 版本回滚</text>
  <line x1="120" y1="340" x2="320" y2="340" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <text x="220" y="358" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#ffd700" text-anchor="middle">Serverless 弹性 · 多模型 Embedding · 智能解析</text>
  <text x="220" y="375" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#ffd700" text-anchor="middle">Neon 时间旅行版本管理</text>

  <!-- Middle Right: Memory Store (Active) -->
  <rect x="360" y="185" width="240" height="230" rx="10" fill="url(#grad4)" stroke="#e056fd" stroke-width="2"/>
  <text x="480" y="213" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e056fd" text-anchor="middle">记忆库</text>
  <text x="480" y="238" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; Agent 长期记忆</text>
  <text x="480" y="260" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 多类型记忆管理</text>
  <text x="480" y="282" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 语义检索 + 时间衰减</text>
  <text x="480" y="304" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 记忆压缩与合并</text>
  <text x="480" y="326" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">&#x2022; 对话轨迹存储</text>
  <line x1="380" y1="340" x2="580" y2="340" stroke="rgba(224,86,253,0.3)" stroke-width="1"/>
  <text x="480" y="358" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#e056fd" text-anchor="middle">场景化记忆分类</text>
  <text x="480" y="375" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#e056fd" text-anchor="middle">按 Agent 类型定制记忆策略</text>

  <!-- Connection: KB/Memory -> Lakebase -->
  <line x1="220" y1="415" x2="220" y2="445" stroke="#ffd700" stroke-width="2"/>
  <line x1="480" y1="415" x2="480" y2="445" stroke="#e056fd" stroke-width="2"/>

  <!-- Bottom: Lakebase (Neon Core) -->
  <rect x="100" y="445" width="500" height="160" rx="12" fill="url(#grad1)" stroke="#00d2ff" stroke-width="3"/>
  <text x="350" y="478" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#00d2ff" text-anchor="middle">Lakebase (Neon 内核)</text>
  <text x="350" y="505" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">存算分离 · 多版本 · 时间旅行 · 分支管理</text>
  <text x="350" y="528" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">按需启动 (3ms 热启动) · 自动扩缩容 · 多租户隔离</text>
  <line x1="120" y1="545" x2="580" y2="545" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
  <text x="350" y="565" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#00d2ff" text-anchor="middle">核心技术：Copy-on-Write 分支隔离</text>

  <!-- Right: AI Data Lake (Full Height) -->
  <rect x="700" y="185" width="400" height="420" rx="12" fill="url(#grad3)" stroke="#2ecc71" stroke-width="3"/>
  <text x="900" y="220" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2ecc71" text-anchor="middle">AI 多模数据湖</text>
  <text x="900" y="255" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; 多模态格式 (Lance + 自研)</text>
  <text x="900" y="279" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; Python/Ray 任务调度</text>
  <text x="900" y="303" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; Dataset 导出 (Parquet)</text>
  <text x="900" y="327" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; 模型微调 (SFT)</text>
  <text x="900" y="351" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; 强化学习 (RL) 训练</text>
  <text x="900" y="375" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; Kata VM 隔离</text>
  <text x="900" y="399" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">&#x2022; 增量 CDC 调度</text>
  <line x1="720" y1="415" x2="1080" y2="415" stroke="rgba(46,204,113,0.3)" stroke-width="1"/>
  <text x="900" y="433" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#2ecc71" text-anchor="middle">Serverless 弹性 · 大规模多模态处理</text>
  <text x="900" y="450" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#2ecc71" text-anchor="middle">新一代多模数据格式 (联合车BU/高校研究)</text>
  <text x="900" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffd700" text-anchor="middle">&#x1F504; 数据飞轮</text>
  <text x="900" y="528" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6" text-anchor="middle">Lakebase &#x2194; 数据湖双向流转</text>

  <!-- Data Flywheel Arrows: Lakebase <-> Data Lake -->
  <path d="M 600 480 L 690 360" stroke="#8ecae6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 690 420 L 600 540" stroke="#8ecae6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="635" y="410" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" text-anchor="middle">导出 + 轨迹数据</text>
  <text x="655" y="500" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" text-anchor="middle">导入</text>

  <!-- Infrastructure Layer -->
  <rect x="100" y="650" width="1000" height="110" rx="10" fill="rgba(255,255,255,0.02)" stroke="#6c7a89" stroke-width="1"/>
  <text x="600" y="675" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8ecae6" text-anchor="middle">基础设施层</text>
  <text x="200" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">Kubernetes (CCE)</text>
  <text x="380" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">对象存储 (OBS)</text>
  <text x="540" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">元数据库 (RDS)</text>
  <text x="700" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">弹性节点池</text>
  <text x="880" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">VPC EP (网络型)</text>
  <text x="1040" y="700" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">NPU/GPU 资源池</text>
  <line x1="120" y1="715" x2="1080" y2="715" stroke="rgba(142,202,230,0.2)" stroke-width="1"/>
  <text x="600" y="735" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#8ecae6" text-anchor="middle">需求：快速弹性 MicroVM · CCI 多租 NPU/GPU 资源池 · 网络型 VPC EP</text>
  <text x="600" y="752" font-family="Arial, sans-serif" font-size="10" fill="#6c7a89" text-anchor="middle">华为云 CCE · 存算分离 · 按需扩缩容</text>

</svg>
