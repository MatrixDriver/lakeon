<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.05" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8ecae6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="650" fill="#0d0d1a"/>

  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d2ff" text-anchor="middle">DBay 数据港湾 - 系统架构</text>
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="14" fill="#8ecae6" text-anchor="middle">面向 Agent 的 Serverless 数据底座</text>

  <!-- Bottom: Lakebase (Neon Core) -->
  <rect x="100" y="320" width="500" height="150" rx="12" fill="url(#grad1)" stroke="#00d2ff" stroke-width="3"/>
  <text x="350" y="360" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#00d2ff" text-anchor="middle">Lakebase (Neon 内核)</text>
  <text x="350" y="390" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">存算分离 · 多版本 · 时间旅行 · 分支管理</text>
  <text x="350" y="415" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">按需启动 (3ms 热启动) · 自动扩缩容 · 多租户隔离</text>
  <text x="350" y="445" font-family="Arial, sans-serif" font-size="12" fill="#8ecae6" text-anchor="middle">Serverless PostgreSQL · 对标 Databricks Lakebase</text>

  <!-- Middle Left: Knowledge Base -->
  <rect x="100" y="110" width="240" height="180" rx="10" fill="url(#grad2)" stroke="#ffd700" stroke-width="2"/>
  <text x="220" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffd700" text-anchor="middle">知识库</text>
  <text x="220" y="175" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">• 文档解析</text>
  <text x="220" y="200" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">• 向量检索 (pgvector)</text>
  <text x="220" y="225" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">• 全文搜索 (tsvector)</text>
  <text x="220" y="250" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">• 表知识库</text>
  <text x="220" y="275" font-family="Arial, sans-serif" font-size="11" fill="#ffd700" text-anchor="middle">对标华为云 CSS</text>

  <!-- Middle Right: Memory Store (Future) -->
  <rect x="360" y="110" width="240" height="180" rx="10" fill="rgba(255,255,255,0.03)" stroke="#8ecae6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="480" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#8ecae6" text-anchor="middle">记忆库 (计划中)</text>
  <text x="480" y="180" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6" text-anchor="middle">Neuromem</text>
  <text x="480" y="210" font-family="Arial, sans-serif" font-size="12" fill="#8ecae6" text-anchor="middle">独立项目开发中</text>
  <text x="480" y="235" font-family="Arial, sans-serif" font-size="12" fill="#8ecae6" text-anchor="middle">未来合入 DBay</text>

  <!-- Connection: KB/Memory -> Lakebase -->
  <line x1="220" y="290" x2="220" y="320" stroke="#ffd700" stroke-width="2"/>
  <line x1="480" y="290" x2="480" y="320" stroke="#8ecae6" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Right: AI Data Lake (Full Height) -->
  <rect x="700" y="110" width="400" height="360" rx="12" fill="url(#grad3)" stroke="#2ecc71" stroke-width="3"/>
  <text x="900" y="150" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2ecc71" text-anchor="middle">AI 多模数据湖</text>
  <text x="900" y="190" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">• Python/Ray 任务调度</text>
  <text x="900" y="220" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">• Dataset 导出 (Parquet)</text>
  <text x="900" y="250" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">• 模型微调</text>
  <text x="900" y="280" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">• Kata VM 隔离</text>
  <text x="900" y="310" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0" text-anchor="middle">• 增量 CDC 调度</text>
  <text x="900" y="350" font-family="Arial, sans-serif" font-size="13" fill="#2ecc71" text-anchor="middle">对标 DataArts Fabric + DLI</text>
  <text x="900" y="395" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffd700" text-anchor="middle">🔄 数据飞轮</text>
  <text x="900" y="425" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6" text-anchor="middle">Lakebase ↔ 数据湖双向流转</text>

  <!-- Data Flywheel Arrows: Lakebase <-> Data Lake -->
  <path d="M 600 360 L 690 280" stroke="#8ecae6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 690 340 L 600 410" stroke="#8ecae6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="640" y="310" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle">导出</text>
  <text x="640" y="390" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle">导入</text>

  <!-- Infrastructure Layer -->
  <rect x="100" y="520" width="1000" height="90" rx="10" fill="rgba(255,255,255,0.02)" stroke="#6c7a89" stroke-width="1"/>
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8ecae6" text-anchor="middle">基础设施层</text>
  <text x="300" y="580" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">Kubernetes (CCE)</text>
  <text x="500" y="580" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">对象存储 (OBS)</text>
  <text x="700" y="580" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">元数据库 (RDS)</text>
  <text x="900" y="580" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">弹性节点池</text>
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="11" fill="#6c7a89" text-anchor="middle">华为云 CCE · 存算分离 · 按需扩缩容</text>

</svg>
