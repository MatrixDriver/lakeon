      - text: 说明 · 5 个 curator 都是
      - strong [ref=e351]: 写
      - text: 角色（write_md / update_md），RecallAgent 是
      - strong [ref=e352]: 纯读
      - text: 角色（不能改 markdown）—— 隔离写权限避免 recall 调用副作用污染数据。EntityCurator 是唯一全工具 agent，因为它要 search 找别名、read 看历史、write 建新 entity dir、update 改 profile。
  - generic [ref=e353]:
    - generic [ref=e354]: 红线
    - heading "代词必须解析 · 一条不退让的硬规则" [level=2] [ref=e355]
    - paragraph [ref=e356]: 所有 LLM-generated markdown（episode 正文、entity profile、trait body、L0/L1/L2 summary、triples）禁止出现未解析代词："she" / "he" / "they" / "the person" 等必须替换成真实名字。
    - generic [ref=e357]:
      - generic [ref=e358]:
        - heading "Prompt 层" [level=3] [ref=e359]
        - paragraph [ref=e360]: 每个 LLM-based curator 的 system prompt 含强制规则："Use real names everywhere; replace pronouns; if cannot resolve, skip the fact."
      - generic [ref=e361]:
        - heading "校验层" [level=3] [ref=e362]
        - paragraph [ref=e363]: 写 markdown 前正则扫描代词，命中则重试 LLM 一次；再失败则丢弃该字段，log warning。
      - generic [ref=e364]:
        - heading "测试层" [level=3] [ref=e365]
        - paragraph [ref=e366]: 每个 worker 单测 + 集成测试都断言输出无未解析代词。这是把质量底线写进 CI 的方式。
  - generic [ref=e367]:
    - generic [ref=e368]: 召回模式
    - heading "Walk vs Snap · 两种召回路径" [level=2] [ref=e369]
    - paragraph [ref=e370]:
      - text: 同一份 markdown 真源，echomem 给上层提供两种取记忆的方式。它们的关系类似
      - emphasis [ref=e371]: agentic search
      - text: 与
      - emphasis [ref=e372]: RAG
      - text: 。
      - strong [ref=e373]: 初步评测（LoCoMo Phase 6.5, 1540 题）显示 Walk 显著优于 Snap：64.03% vs 41.82%
      - text: ——所以 Walk 是默认。
    - generic [ref=e374]:
      - generic [ref=e375]:
        - text: 默认 / 推荐
        - heading "Walk · 漫步召回" [level=3] [ref=e376]
        - paragraph [ref=e377]: Recall agent 拿着 markdown filesystem 工具集（list_directory, read_markdown, search_memories）在记忆树上一步步走。先看 _index.md 总览，再决定打开哪个 session、哪个 episode、哪个 entity profile，最后产出回答。多轮 LLM 推理，但每步看到的上下文都很精准。
        - list [ref=e378]:
          - listitem [ref=e379]: 多步 · 一次问题 = 3-8 次 LLM 调用
          - listitem [ref=e380]: 渐进披露 · L0 → L1 → L2 → raw 按需深入
          - listitem [ref=e381]: 跨 session 推理 · 自然支持（agent 自己翻多个 episode）
      - generic [ref=e382]:
        - text: 备选 / 低延迟
        - heading "Snap · 直击召回" [level=3] [ref=e383]
        - paragraph [ref=e384]: 类经典 RAG：把 query embed 一次，vec0 + fts5 联合检索 top-K，把命中的 markdown 片段拼成 context 一次性给上层 LLM。零迭代，最快返回。在简单事实型问题上够用，但在长程跨 session 推理上明显被 Walk 拉开差距。
        - list [ref=e385]:
          - listitem [ref=e386]: 单步 · 一次问题 = 1 次 vec query + 1 次 LLM 生成
          - listitem [ref=e387]: 固定上下文窗 · top-K 即全部
          - listitem [ref=e388]: 跨 session 推理 · 受限于 K 与 chunk 边界
    - paragraph [ref=e390]:
      - text: "\"我们认为 Walk 才是这套架构的主角——markdown 文件树本来就是为 agent 漫步而生的。Snap 留作低延迟 fallback。"
      - link "完整评测数据 →" [ref=e391] [cursor=pointer]:
        - /url: /benchmarks/
      - text: "\""
  - generic [ref=e392]:
    - generic [ref=e393]: 设计原则
    - heading "六条不动摇的取舍" [level=2] [ref=e394]
    - generic [ref=e395]:
      - generic [ref=e396]:
        - heading "Markdown is source of truth" [level=3] [ref=e397]
        - paragraph [ref=e398]: 所有衍生物落盘 markdown。SQLite 是索引层，可重建。开发者用文件浏览器直接审视记忆质量，不用查表。
      - generic [ref=e399]:
        - heading "Local-first" [level=3] [ref=e400]
        - paragraph [ref=e401]: 本地是主战场。备份就是 cp ~/.echomem。云端是可选挂载，不是默认依赖。
      - generic [ref=e402]:
        - heading "Workers ARE agents" [level=3] [ref=e403]
        - paragraph [ref=e404]: 每个 worker 是 curator agent，有 LLM、有工具、自主维护一棵 markdown 子树。recall agent 和 curator 共享工具集。
      - generic [ref=e405]:
        - heading "代词必须解析" [level=3] [ref=e406]
        - paragraph [ref=e407]: LLM 生成内容里禁止 "she/he/they"；prompt 强制 + 正则校验 + 单测覆盖。质量底线写进 CI。
      - generic [ref=e408]:
        - heading "小模型友好" [level=3] [ref=e409]
        - paragraph [ref=e410]: 衍生物 pipeline 对 gemma 4B 量级模型留降级路径。worker LLM 可切 OpenAI-compat（DeepSeek 等），并发与延迟自适应。
      - generic [ref=e411]:
        - heading "Hook 不入侵" [level=3] [ref=e412]
        - paragraph [ref=e413]: 所有可选能力通过 Agent 框架 hook 接入，不修改 Agent 业务代码。
    - paragraph [ref=e415]: "\"echomem 不是一个新东西。它是把 dbay 已经验证过的那些概念——记忆、衍生物、AgentFS——挪回本地，让一台 MacBook 也能体面地服务三家 Agent。\""
