  - generic [ref=e227]:
    - generic [ref=e228]: 真源
    - heading "Markdown 是真源 · SQLite 是索引" [level=2] [ref=e229]
    - paragraph [ref=e230]: echomem 把所有记忆与衍生物都落盘成可读 markdown 文件。SQLite 仅承担向量检索、全文索引、元数据查询等加速职责。开发者用文件浏览器即可审视记忆质量。
    - generic [ref=e231]:
      - generic [ref=e232]:
        - heading "为什么 markdown 第一" [level=3] [ref=e233]
        - paragraph [ref=e234]: 记忆系统的本质是"我记得什么"——如果你看不到、改不动，就是黑盒。markdown 是人可读、可版本控制、可手工修正的；dashboard 直接渲染同一份文件；agent 调 read_markdown(path) 也是同一份文件。
      - generic [ref=e235]:
        - heading "SQLite 仅作加速" [level=3] [ref=e236]
        - paragraph [ref=e237]: 把 markdown 文件的 1024-dim embedding 存进 markdown_vec，把 path 元数据存进 markdown_meta。markdown 重算可重建索引；索引坏了不影响数据；两者通过 content_hash 同步。
  - generic [ref=e238]:
    - generic [ref=e239]: 目录结构
    - heading "文件树即记忆树" [level=2] [ref=e240]
    - paragraph [ref=e241]: 每个 agent 一个独立目录。session、entity、trait 各占一支。目录名带语义（日期前缀、人名 slug），方便 ls、grep、肉眼浏览。
    - generic [ref=e242]: "~/.echomem/markdown/ └── agents/<agent_id>/ ├── _profile.md # agent 自我介绍 ├── _meta.yaml # 全局统计 │ ├── sessions/ │ ├── _index.md # 时间倒序总览 │ └── <yyyy-mm-dd>_<sid>/ │ ├── _meta.yaml # date, msg_count, speakers │ ├── L0_brief.md # 一句话 (~30 tokens) │ ├── L1_summary.md # 段落 (~300 tokens) │ ├── L2_outline.md # 多节大纲 (~1k tokens) │ ├── messages/ # raw turn × N │ │ ├── 001_<mid>.md │ │ └── ... │ └── episodes/ # LLM 抽取的事件 │ ├── 01_<eid>.md │ └── ... │ ├── entities/ │ ├── _index.md │ └── <slug>/ # 实体名 slugified │ ├── _meta.yaml # aliases, kind, occurrence │ ├── profile.md # 跨 session 归纳 │ └── triples.md # (主, 谓, 宾) 明细 │ └── traits/ # 跨 session 高阶反思 ├── behavior/ # 行为模式 ├── preference/ # 偏好与价值观 └── core/ # 身份级核心特质"
    - generic [ref=e243]:
      - generic [ref=e244]:
        - heading "_meta.yaml" [level=3] [ref=e245]
        - paragraph [ref=e246]: 每个有意义的目录或对象都有。机读元数据：date、msg_count、aliases、confidence、merge_history 等。dashboard 读这个渲染概览。
      - generic [ref=e247]:
        - heading "_index.md" [level=3] [ref=e248]
        - paragraph [ref=e249]: 每个目录都有。人读索引，列出子项。dashboard 渲染目录树时用。
      - generic [ref=e250]:
        - heading "原子写入" [level=3] [ref=e251]
        - paragraph [ref=e252]: 每次 markdown 写入用 tmp + rename，避免半写文件被读到。markdown 写完才 commit SQLite，跨层强一致。
  - generic [ref=e253]:
    - generic [ref=e254]: Curator Agents
    - heading "五个后台 Agent · 默默维护这棵树" [level=2] [ref=e255]
    - paragraph [ref=e256]: echomem 后端不是被动 worker，而是五个 curator agent。每个有自己的领域、触发条件、LLM 工具集。recall agent 和 curator agent 共享 read_markdown / list_directory / update_markdown / search_memories 同一套工具——只是触发时机不同。
    - generic [ref=e257]:
      - generic [ref=e258]:
        - text: "1"
        - heading "MessageWriter" [level=3] [ref=e259]
        - paragraph [ref=e260]: 每条 ingest 触发；纯落盘，无 LLM。写 sessions/<dir>/messages/NNN.md，更新 session 元数据。embed 全文给 search_memories 用。
      - generic [ref=e261]:
        - text: "2"
        - heading "SessionSummarizer" [level=3] [ref=e262]
        - paragraph [ref=e263]: session "close" 触发；一次 LLM 调用产出三段（L0/L1/L2 一份 prompt 一次 JSON 输出）。覆盖式写入。
      - generic [ref=e264]:
        - text: "3"
        - heading "EpisodeExtractor" [level=3] [ref=e265]
        - paragraph [ref=e266]: session close 触发，per-session 一次（不再 per-memory 重复）。从 L2_outline 抽 LLM 语义事件，含绝对时间戳、人物、地点、情感。
      - generic [ref=e267]:
        - text: "4"
        - heading "EntityCurator" [level=3] [ref=e268]
        - paragraph [ref=e269]: session close 触发；per-entity 一次 LLM 归纳。处理跨 session 别名（"Caroline" / "Carol" / "Caz" → 同一目录），用 fuzzy 匹配 + LLM 判定 + alias 列表。
      - generic [ref=e270]:
        - text: "5"
        - heading "TraitReflector" [level=3] [ref=e271]
        - paragraph [ref=e272]: 每 K episodes（默认 10）或定时 / on-demand 触发。读 episodes + entity profiles，提炼 user 跨 session 持久特质——分行为 / 偏好 / 核心三层。这是从 LOCOMO 60% 走向 80% 区间的关键层（neuromem 同款思路）。
    - paragraph [ref=e274]: "\"workers ARE agents——curator 在后台默默写记忆树，recall 在前台帮 user 查记忆树，他们用同一套工具、读写同一份 markdown。\""
    - heading "Agent × Tool 矩阵" [level=3] [ref=e275]
    - paragraph [ref=e276]: 所有 agent 共享同一个 7-工具的 toolbox。差异在于每个 agent 的 prompt 和被授权的工具子集——这种设计让 curator 和 recall 可以共享工具实现，不重复造轮子。
