  - generic [ref=e178]:
    - generic [ref=e179]: 真源
    - heading "Markdown 是真源 · SQLite 是索引" [level=2] [ref=e180]
    - paragraph [ref=e181]: echomem 把所有记忆与衍生物都落盘成可读 markdown 文件。SQLite 仅承担向量检索、全文索引、元数据查询等加速职责。开发者用文件浏览器即可审视记忆质量。
    - generic [ref=e182]:
      - generic [ref=e183]:
        - heading "为什么 markdown 第一" [level=3] [ref=e184]
        - paragraph [ref=e185]: 记忆系统的本质是"我记得什么"——如果你看不到、改不动，就是黑盒。markdown 是人可读、可版本控制、可手工修正的；dashboard 直接渲染同一份文件；agent 调 read_markdown(path) 也是同一份文件。
      - generic [ref=e186]:
        - heading "SQLite 仅作加速" [level=3] [ref=e187]
        - paragraph [ref=e188]: 把 markdown 文件的 1024-dim embedding 存进 markdown_vec，把 path 元数据存进 markdown_meta。markdown 重算可重建索引；索引坏了不影响数据；两者通过 content_hash 同步。
  - generic [ref=e189]:
    - generic [ref=e190]: 目录结构
    - heading "文件树即记忆树" [level=2] [ref=e191]
    - paragraph [ref=e192]: 每个 agent 一个独立目录。session、entity、trait 各占一支。目录名带语义（日期前缀、人名 slug），方便 ls、grep、肉眼浏览。
    - generic [ref=e193]: "~/.echomem/markdown/ └── agents/<agent_id>/ ├── _profile.md # agent 自我介绍 ├── _meta.yaml # 全局统计 │ ├── sessions/ │ ├── _index.md # 时间倒序总览 │ └── <yyyy-mm-dd>_<sid>/ │ ├── _meta.yaml # date, msg_count, speakers │ ├── L0_brief.md # 一句话 (~30 tokens) │ ├── L1_summary.md # 段落 (~300 tokens) │ ├── L2_outline.md # 多节大纲 (~1k tokens) │ ├── messages/ # raw turn × N │ │ ├── 001_<mid>.md │ │ └── ... │ └── episodes/ # LLM 抽取的事件 │ ├── 01_<eid>.md │ └── ... │ ├── entities/ │ ├── _index.md │ └── <slug>/ # 实体名 slugified │ ├── _meta.yaml # aliases, kind, occurrence │ ├── profile.md # 跨 session 归纳 │ └── triples.md # (主, 谓, 宾) 明细 │ └── traits/ # 跨 session 高阶反思 ├── behavior/ # 行为模式 ├── preference/ # 偏好与价值观 └── core/ # 身份级核心特质"
    - generic [ref=e194]:
      - generic [ref=e195]:
        - heading "_meta.yaml" [level=3] [ref=e196]
        - paragraph [ref=e197]: 每个有意义的目录或对象都有。机读元数据：date、msg_count、aliases、confidence、merge_history 等。dashboard 读这个渲染概览。
      - generic [ref=e198]:
        - heading "_index.md" [level=3] [ref=e199]
        - paragraph [ref=e200]: 每个目录都有。人读索引，列出子项。dashboard 渲染目录树时用。
      - generic [ref=e201]:
        - heading "原子写入" [level=3] [ref=e202]
        - paragraph [ref=e203]: 每次 markdown 写入用 tmp + rename，避免半写文件被读到。markdown 写完才 commit SQLite，跨层强一致。
  - generic [ref=e204]:
    - generic [ref=e205]: Curator Agents
    - heading "五个后台 Agent · 默默维护这棵树" [level=2] [ref=e206]
    - paragraph [ref=e207]: echomem 后端不是被动 worker，而是五个 curator agent。每个有自己的领域、触发条件、LLM 工具集。recall agent 和 curator agent 共享 read_markdown / list_directory / update_markdown / search_memories 同一套工具——只是触发时机不同。
    - generic [ref=e208]:
      - generic [ref=e209]:
        - text: "1"
        - heading "MessageWriter" [level=3] [ref=e210]
        - paragraph [ref=e211]: 每条 ingest 触发；纯落盘，无 LLM。写 sessions/<dir>/messages/NNN.md，更新 session 元数据。embed 全文给 search_memories 用。
      - generic [ref=e212]:
        - text: "2"
        - heading "SessionSummarizer" [level=3] [ref=e213]
        - paragraph [ref=e214]: session "close" 触发；一次 LLM 调用产出三段（L0/L1/L2 一份 prompt 一次 JSON 输出）。覆盖式写入。
      - generic [ref=e215]:
        - text: "3"
        - heading "EpisodeExtractor" [level=3] [ref=e216]
        - paragraph [ref=e217]: session close 触发，per-session 一次（不再 per-memory 重复）。从 L2_outline 抽 LLM 语义事件，含绝对时间戳、人物、地点、情感。
      - generic [ref=e218]:
        - text: "4"
        - heading "EntityCurator" [level=3] [ref=e219]
        - paragraph [ref=e220]: session close 触发；per-entity 一次 LLM 归纳。处理跨 session 别名（"Caroline" / "Carol" / "Caz" → 同一目录），用 fuzzy 匹配 + LLM 判定 + alias 列表。
      - generic [ref=e221]:
        - text: "5"
        - heading "TraitReflector" [level=3] [ref=e222]
        - paragraph [ref=e223]: 每 K episodes（默认 10）或定时 / on-demand 触发。读 episodes + entity profiles，提炼 user 跨 session 持久特质——分行为 / 偏好 / 核心三层。这是从 LOCOMO 60% 走向 80% 区间的关键层（neuromem 同款思路）。
    - paragraph [ref=e225]: "\"workers ARE agents——curator 在后台默默写记忆树，recall 在前台帮 user 查记忆树，他们用同一套工具、读写同一份 markdown。\""
  - generic [ref=e226]:
    - generic [ref=e227]: 红线
    - heading "代词必须解析 · 一条不退让的硬规则" [level=2] [ref=e228]
    - paragraph [ref=e229]: 所有 LLM-generated markdown（episode 正文、entity profile、trait body、L0/L1/L2 summary、triples）禁止出现未解析代词："she" / "he" / "they" / "the person" 等必须替换成真实名字。
    - generic [ref=e230]:
      - generic [ref=e231]:
        - heading "Prompt 层" [level=3] [ref=e232]
        - paragraph [ref=e233]: 每个 LLM-based curator 的 system prompt 含强制规则："Use real names everywhere; replace pronouns; if cannot resolve, skip the fact."
      - generic [ref=e234]:
        - heading "校验层" [level=3] [ref=e235]
        - paragraph [ref=e236]: 写 markdown 前正则扫描代词，命中则重试 LLM 一次；再失败则丢弃该字段，log warning。
      - generic [ref=e237]:
        - heading "测试层" [level=3] [ref=e238]
        - paragraph [ref=e239]: 每个 worker 单测 + 集成测试都断言输出无未解析代词。这是把质量底线写进 CI 的方式。
  - generic [ref=e240]:
    - generic [ref=e241]: 召回模式
    - heading "Walk vs Snap · 两种召回路径" [level=2] [ref=e242]
    - paragraph [ref=e243]:
      - text: 同一份 markdown 真源，echomem 给上层提供两种取记忆的方式。它们的关系类似
      - emphasis [ref=e244]: agentic search
      - text: 与
      - emphasis [ref=e245]: RAG
      - text: 。
      - strong [ref=e246]: 初步评测（LoCoMo Phase 6.5, 1540 题）显示 Walk 显著优于 Snap：64.03% vs 41.82%
      - text: ——所以 Walk 是默认。
    - generic [ref=e247]:
      - generic [ref=e248]:
        - text: 默认 / 推荐
        - heading "Walk · 漫步召回" [level=3] [ref=e249]
        - paragraph [ref=e250]: Recall agent 拿着 markdown filesystem 工具集（list_directory, read_markdown, search_memories）在记忆树上一步步走。先看 _index.md 总览，再决定打开哪个 session、哪个 episode、哪个 entity profile，最后产出回答。多轮 LLM 推理，但每步看到的上下文都很精准。
        - list [ref=e251]:
          - listitem [ref=e252]: 多步 · 一次问题 = 3-8 次 LLM 调用
          - listitem [ref=e253]: 渐进披露 · L0 → L1 → L2 → raw 按需深入
          - listitem [ref=e254]: 跨 session 推理 · 自然支持（agent 自己翻多个 episode）
      - generic [ref=e255]:
        - text: 备选 / 低延迟
        - heading "Snap · 直击召回" [level=3] [ref=e256]
        - paragraph [ref=e257]: 类经典 RAG：把 query embed 一次，vec0 + fts5 联合检索 top-K，把命中的 markdown 片段拼成 context 一次性给上层 LLM。零迭代，最快返回。在简单事实型问题上够用，但在长程跨 session 推理上明显被 Walk 拉开差距。
        - list [ref=e258]:
          - listitem [ref=e259]: 单步 · 一次问题 = 1 次 vec query + 1 次 LLM 生成
          - listitem [ref=e260]: 固定上下文窗 · top-K 即全部
          - listitem [ref=e261]: 跨 session 推理 · 受限于 K 与 chunk 边界
    - paragraph [ref=e263]:
      - text: "\"我们认为 Walk 才是这套架构的主角——markdown 文件树本来就是为 agent 漫步而生的。Snap 留作低延迟 fallback。"
      - link "完整评测数据 →" [ref=e264] [cursor=pointer]:
        - /url: /benchmarks/
      - text: "\""
  - generic [ref=e265]:
    - generic [ref=e266]: 设计原则
    - heading "六条不动摇的取舍" [level=2] [ref=e267]
    - generic [ref=e268]:
      - generic [ref=e269]:
        - heading "Markdown is source of truth" [level=3] [ref=e270]
        - paragraph [ref=e271]: 所有衍生物落盘 markdown。SQLite 是索引层，可重建。开发者用文件浏览器直接审视记忆质量，不用查表。
      - generic [ref=e272]:
        - heading "Local-first" [level=3] [ref=e273]
        - paragraph [ref=e274]: 本地是主战场。备份就是 cp ~/.echomem。云端是可选挂载，不是默认依赖。
      - generic [ref=e275]:
        - heading "Workers ARE agents" [level=3] [ref=e276]
        - paragraph [ref=e277]: 每个 worker 是 curator agent，有 LLM、有工具、自主维护一棵 markdown 子树。recall agent 和 curator 共享工具集。
      - generic [ref=e278]:
        - heading "代词必须解析" [level=3] [ref=e279]
        - paragraph [ref=e280]: LLM 生成内容里禁止 "she/he/they"；prompt 强制 + 正则校验 + 单测覆盖。质量底线写进 CI。
      - generic [ref=e281]:
        - heading "小模型友好" [level=3] [ref=e282]
        - paragraph [ref=e283]: 衍生物 pipeline 对 gemma 4B 量级模型留降级路径。worker LLM 可切 OpenAI-compat（DeepSeek 等），并发与延迟自适应。
      - generic [ref=e284]:
        - heading "Hook 不入侵" [level=3] [ref=e285]
        - paragraph [ref=e286]: 所有可选能力通过 Agent 框架 hook 接入，不修改 Agent 业务代码。
    - paragraph [ref=e288]: "\"echomem 不是一个新东西。它是把 dbay 已经验证过的那些概念——记忆、衍生物、AgentFS——挪回本地，让一台 MacBook 也能体面地服务三家 Agent。\""
